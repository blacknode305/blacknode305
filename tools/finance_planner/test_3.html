<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>blacknode305 • Финансовый планировщик</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#0f0f13;
 --card:rgba(20,20,28,.72);
 --text:#e8e8f0;
 --muted:#9aa0b4;
 --accent:#8b5cf6;
 --accent2:#06b6d4;
 --success:#22c55e;
 --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
 --bg:#f8fafc;
 --card:rgba(255,255,255,.82);
 --text:#1e293b;
 --muted:#64748b;
 --border:rgba(0,0,0,.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
 font-family:'Inter',sans-serif;
 background:var(--bg);
 color:var(--text);
 min-height:100vh;
 padding:14px;
}

.container{max-width:1000px;margin:auto;}

.header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:20px;
}

.logo{
 font-family:'Space Grotesk',sans-serif;
 font-size:22px;
 font-weight:700;
 background:linear-gradient(135deg,var(--accent),var(--accent2));
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.theme-btn{
 width:42px;
 height:42px;
 border:none;
 border-radius:12px;
 cursor:pointer;
 background:var(--card);
 color:var(--text);
 border:1px solid var(--border);
}

.card{
 background:var(--card);
 border:1px solid var(--border);
 border-radius:18px;
 padding:16px;
 margin-bottom:14px;
}

.section-title{
 margin-bottom:12px;
 font-family:'Space Grotesk',sans-serif;
}

.grid{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:14px;
 margin-bottom:14px;
}

.input{
 width:100%;
 padding:12px;
 border-radius:12px;
 border:1px solid var(--border);
 background:rgba(255,255,255,.04);
 color:var(--text);
 margin-bottom:10px;
}

.btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 cursor:pointer;
 font-weight:600;
 color:white;
 background:linear-gradient(135deg,var(--accent),var(--accent2));
}

.progress{
 width:100%;
 height:18px;
 background:rgba(255,255,255,.08);
 border-radius:999px;
 overflow:hidden;
}

.progress-fill{
 height:100%;
 width:0%;
 background:linear-gradient(135deg,#22c55e,#16a34a);
 transition:.4s;
}

.stats{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
 margin-top:10px;
}

.stat{
 background:rgba(255,255,255,.03);
 border-radius:14px;
 padding:12px;
 text-align:center;
}

.label{
 color:var(--muted);
 font-size:12px;
 margin-bottom:4px;
}

.value{
 font-size:18px;
 font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">blacknode305</div>
<button class="theme-btn" onclick="toggleTheme()">☀️</button>
</div>

<div class="card">
<h3>Создать план</h3>

<input id="planName" class="input" placeholder="Название плана">
<input id="startDate" class="input" type="date">
<input id="endDate" class="input" type="date">
<input id="targetAmount" class="input" type="number" placeholder="Целевая сумма">

<button class="btn" onclick="savePlan()">Сохранить план</button>
</div>

<div class="card">
<h3>Пополнение</h3>

<input id="incomeDate" class="input" type="date">
<input id="incomeAmount" class="input" type="number" placeholder="Сумма">

<button class="btn" onclick="addIncome()">Добавить</button>
</div>

<!-- 🔥 ПЛАНЫ (ОБНОВЛЁННЫЙ БЛОК) -->
<div class="card">
<h3>Планы</h3>
<div id="plansContainer"></div>
</div>

</div>

<script>

let plans =
JSON.parse(localStorage.getItem('plans') || '[]');

let incomes =
JSON.parse(localStorage.getItem('incomes') || '[]');

function save(){
 localStorage.setItem('plans',JSON.stringify(plans));
 localStorage.setItem('incomes',JSON.stringify(incomes));
}

function savePlan(){

 plans.push({
  name: planName.value,
  start: startDate.value,
  end: endDate.value,
  target: Number(targetAmount.value)||0,
  saved: 0
 });

 save();
 render();
}

function addIncome(){

 let amount = Number(incomeAmount.value);
 if(!amount) return;

 incomes.unshift({
  amount,
  date: incomeDate.value
 });

 distribute(amount);

 save();
 render();
}

function distribute(amount){

 for(let p of plans){

  if(p.saved < p.target){

   let need = p.target - p.saved;
   let add = Math.min(need,amount);

   p.saved += add;
   amount -= add;

   if(amount <= 0) break;
  }
 }
}

function daysLeft(end){
 if(!end) return 0;
 return Math.max(0,
  Math.ceil((new Date(end)-new Date())/86400000)
 );
}

function render(){

 const container =
 document.getElementById('plansContainer');

 container.innerHTML = '';

 plans.forEach((p,i)=>{

  let percent =
  p.target ? (p.saved/p.target)*100 : 0;

  let remain =
  Math.max(0,p.target-p.saved);

  container.innerHTML += `
  <div class="card">

   <h3>${p.name}</h3>

   <div class="stats">

    <div class="stat">
     <div class="label">Цель</div>
     <div class="value">${p.target} ₸</div>
    </div>

    <div class="stat">
     <div class="label">Накоплено</div>
     <div class="value">${p.saved} ₸</div>
    </div>

    <div class="stat">
     <div class="label">Осталось</div>
     <div class="value">${remain} ₸</div>
    </div>

    <div class="stat">
     <div class="label">Дней</div>
     <div class="value">${daysLeft(p.end)}</div>
    </div>

   </div>

   <div class="stats">
    <div class="stat">
     <div class="label">Выполнено</div>
     <div class="value">${percent.toFixed(1)}%</div>
    </div>
   </div>

   <div class="progress" style="margin-top:10px">
    <div class="progress-fill" style="width:${percent}%"></div>
   </div>

  </div>
  `;
 });
}

function toggleTheme(){
 document.documentElement.dataset.theme =
 document.documentElement.dataset.theme === 'dark'
 ? 'light'
 : 'dark';
}

render();

</script>

</body>
</html>

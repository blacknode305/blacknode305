<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>blacknode305 • Финансовый планировщик</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
 --bg:#0f0f13;
 --card:rgba(20,20,28,.72);
 --text:#e8e8f0;
 --muted:#9aa0b4;
 --accent:#8b5cf6;
 --accent2:#06b6d4;
 --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
 --bg:#f8fafc;
 --card:rgba(255,255,255,.82);
 --text:#1e293b;
 --muted:#64748b;
 --border:rgba(0,0,0,.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
 font-family:Inter;
 background:var(--bg);
 color:var(--text);
 padding:14px;
}

.container{max-width:1000px;margin:auto;}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}

.logo{
 font-family:"Space Grotesk";
 font-size:22px;
 font-weight:700;
 background:linear-gradient(135deg,var(--accent),var(--accent2));
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.theme-btn{
 width:42px;height:42px;
 border:none;border-radius:12px;
 background:var(--card);
 color:var(--text);
 cursor:pointer;
}

.card{
 background:var(--card);
 border:1px solid var(--border);
 padding:16px;
 border-radius:18px;
 margin-bottom:14px;
}

.input{
 width:100%;
 padding:12px;
 margin-bottom:10px;
 border-radius:12px;
 border:1px solid var(--border);
 background:rgba(255,255,255,.04);
 color:var(--text);
}

.btn{
 width:100%;
 padding:12px;
 border:none;
 border-radius:12px;
 background:linear-gradient(135deg,var(--accent),var(--accent2));
 color:white;
 cursor:pointer;
 font-weight:600;
}

.plan{
 padding:12px;
 border:1px solid var(--border);
 border-radius:14px;
 margin-bottom:10px;
}

.small{
 font-size:12px;
 color:var(--muted);
 margin-top:2px;
}

.progress{
 height:12px;
 background:rgba(255,255,255,.1);
 border-radius:999px;
 overflow:hidden;
 margin-top:8px;
}

.progress-fill{
 height:100%;
 width:0%;
 background:linear-gradient(135deg,#22c55e,#16a34a);
}

.delete-btn{
 background:none;
 border:none;
 color:#ef4444;
 cursor:pointer;
 margin-top:8px;
}

.status-box{
 padding:14px;
 border-radius:14px;
 border:1px solid var(--border);
 background:var(--card);
 margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">blacknode305</div>
<button class="theme-btn" onclick="toggleTheme()">☀️</button>
</div>

<div class="card">
<h3>Создать план</h3>

<input id="pName" class="input" placeholder="Название">
<input id="pPriority" class="input" type="number" placeholder="Приоритет (1 = высокий)">
<input id="pTarget" class="input" type="number" placeholder="Цель ₸">
<input id="pStart" class="input" type="date">
<input id="pEnd" class="input" type="date">

<button class="btn" onclick="addPlan()">Добавить план</button>
</div>

<div class="card">
<h3>Пополнение</h3>

<input id="incDate" class="input" type="date">
<input id="incAmount" class="input" type="number" placeholder="Сумма">

<button class="btn" onclick="addIncome()">Добавить</button>
</div>

<div class="card">
<h3>Планы</h3>
<div id="plans"></div>
</div>

<div id="status" class="status-box"></div>

</div>

<script>

let plans = JSON.parse(localStorage.getItem('plans') || '[]');
let incomes = JSON.parse(localStorage.getItem('incomes') || '[]');

function save(){
 localStorage.setItem('plans',JSON.stringify(plans));
 localStorage.setItem('incomes',JSON.stringify(incomes));
}

function addPlan(){

 const name = document.getElementById('pName').value;
 const priority = Number(document.getElementById('pPriority').value)||999;
 const target = Number(document.getElementById('pTarget').value)||0;
 const start = document.getElementById('pStart').value;
 const end = document.getElementById('pEnd').value;

 if(!name || !target) return;

 plans.push({
  name,
  priority,
  target,
  start,
  end,
  saved:0
 });

 save();
 render();
}

function addIncome(){

 const amount = Number(document.getElementById('incAmount').value);
 const date = document.getElementById('incDate').value;

 if(!amount) return;

 incomes.unshift({amount,date});

 distribute(amount);

 save();
 render();
}

function distribute(amount){

 for(let p of plans){

  if(p.saved < p.target){

   let need = p.target - p.saved;
   let add = Math.min(need,amount);

   p.saved += add;
   amount -= add;

   if(amount <= 0) break;
  }
 }
}

function deletePlan(i){
 plans.splice(i,1);
 save();
 render();
}

function sortPlans(){
 plans.sort((a,b)=>a.priority-b.priority);
}

function daysLeft(end){
 if(!end) return 0;
 return Math.max(0,
  Math.ceil((new Date(end)-new Date())/86400000)
 );
}

function render(){

 sortPlans();

 const plansDiv = document.getElementById('plans');
 const status = document.getElementById('status');

 let html='';

 plans.forEach((p,i)=>{

  let percent = p.target ? (p.saved/p.target)*100 : 0;

  html += `
  <div class="plan">
   <b>${p.name}</b>
   <div class="small">Приоритет: ${p.priority}</div>
   <div class="small">С ${p.start||'-'} по ${p.end||'-'}</div>
   <div class="small">Осталось дней: ${daysLeft(p.end)}</div>
   <div class="small">${p.saved} / ${p.target} ₸</div>

   <div class="progress">
    <div class="progress-fill" style="width:${percent}%"></div>
   </div>

   <button class="delete-btn" onclick="deletePlan(${i})">Удалить</button>
  </div>
  `;
 });

 plansDiv.innerHTML = html;

 let totalSaved = plans.reduce((s,p)=>s+p.saved,0);
 let totalTarget = plans.reduce((s,p)=>s+p.target,0);
 let percent = totalTarget ? (totalSaved/totalTarget)*100 : 0;

 status.innerHTML = `
 <h3>Общий прогресс</h3>
 <div class="small">Накоплено: ${totalSaved} ₸</div>
 <div class="small">Цель: ${totalTarget} ₸</div>

 <div class="progress">
  <div class="progress-fill" style="width:${percent}%"></div>
 </div>

 <div class="small">Выполнено: ${percent.toFixed(1)}%</div>
 `;
}

function toggleTheme(){
 document.documentElement.dataset.theme =
 document.documentElement.dataset.theme === 'dark'
 ? 'light'
 : 'dark';
}

render();

</script>

</body>
</html>

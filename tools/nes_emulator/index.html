<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>blacknode305 • NES Emulator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f13;
  --card:rgba(20,20,28,.72);
  --text:#e8e8f0;
  --muted:#9aa0b4;

  --accent:#8b5cf6;
  --accent2:#06b6d4;

  --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --card:rgba(255,255,255,.82);
  --text:#1e293b;
  --muted:#64748b;

  --border:rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  background:var(--bg);
  color:var(--text);

  min-height:100vh;

  padding:24px 14px;

  transition:.35s ease;

  overflow-x:hidden;
}

body::before{
  content:'';

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);

  z-index:-1;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:30px;
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.theme-toggle{
  width:46px;
  height:46px;

  border:none;
  border-radius:14px;

  cursor:pointer;

  background:var(--card);

  color:var(--text);

  font-size:18px;

  border:1px solid var(--border);

  backdrop-filter:blur(20px);

  transition:.25s ease;
}

.theme-toggle:hover{
  transform:scale(1.06);
}

.hero{
  margin-bottom:24px;
}

.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;

  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:22px;

  backdrop-filter:blur(24px);

  padding:18px;

  margin-bottom:22px;
}

.screen-wrap{
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas{
  width:100%;
  max-width:768px;

  image-rendering:pixelated;

  border-radius:18px;

  background:black;

  border:1px solid var(--border);

  box-shadow:
    0 0 40px rgba(0,0,0,.4),
    0 0 25px rgba(139,92,246,.15);
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;

  margin-top:20px;
}

.select,
.btn,
.file-label{
  border:none;
  outline:none;
}

.file-label,
.btn{
  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  color:white;

  padding:12px 18px;

  border-radius:14px;

  font-weight:600;

  cursor:pointer;

  transition:.25s ease;

  display:flex;
  align-items:center;
  justify-content:center;
}

.btn:hover,
.file-label:hover{
  transform:translateY(-2px);
}

.file-label input{
  display:none;
}

.gamepad{
  margin-top:30px;

  display:flex;
  justify-content:center;
  align-items:center;

  gap:40px;

  flex-wrap:wrap;
}

.dpad{
  display:grid;

  grid-template-columns:
    repeat(3,70px);

  gap:10px;
}

.pad-btn{
  width:70px;
  height:70px;

  border:none;

  border-radius:20px;

  background:rgba(255,255,255,.05);

  color:white;

  font-size:24px;

  border:1px solid var(--border);

  backdrop-filter:blur(10px);

  cursor:pointer;

  transition:.12s ease;

  user-select:none;
}

.pad-btn:active,
.pad-btn.active{
  transform:scale(.92);

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  box-shadow:
    0 0 20px rgba(139,92,246,.5);
}

.empty{
  visibility:hidden;
}

.ab-buttons{
  display:flex;
  gap:20px;
  align-items:center;
}

.ab-btn{
  width:90px;
  height:90px;

  border-radius:999px;

  border:none;

  color:white;

  font-size:28px;

  font-weight:700;

  cursor:pointer;

  transition:.12s ease;
}

.a-btn{
  background:
    linear-gradient(
      135deg,
      #8b5cf6,
      #7c3aed
    );
}

.b-btn{
  background:
    linear-gradient(
      135deg,
      #06b6d4,
      #0891b2
    );
}

.ab-btn:active,
.ab-btn.active{
  transform:scale(.9);
}

.bottom-controls{
  margin-top:25px;

  display:flex;
  justify-content:center;
  gap:16px;
  flex-wrap:wrap;
}

.small-btn{
  min-width:120px;
}

.info{
  margin-top:24px;

  color:var(--muted);

  line-height:1.7;

  text-align:center;
}

.footer{
  margin-top:34px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media(max-width:700px){

  .gamepad{
    gap:20px;
  }

  .pad-btn{
    width:58px;
    height:58px;
  }

  .ab-btn{
    width:74px;
    height:74px;
  }

}

</style>
</head>
<body>

<div class="container">

<header class="header">

<div class="logo">
  <a href="https://blacknode305.github.io/blacknode305/" class="logo">blacknode305</a>
</div>

<button
  class="theme-toggle"
  id="themeToggle"
>
☀️
</button>

</header>

<section class="hero">

<h1>
NES Emulator
</h1>

<p>
JSNES Emulator с экранными кнопками и звуком
</p>

</section>

<div class="card">

<div class="screen-wrap">

<canvas id="emulator"></canvas>

</div>

<div class="controls">

<label class="file-label">

Загрузить ROM

<input
  type="file"
  id="romInput"
  accept=".nes"
/>

</label>

<button
  class="btn"
  id="startBtn"
>
Запустить
</button>

<button
  class="btn"
  id="fullscreenBtn"
>
Fullscreen
</button>

</div>

<div class="gamepad">

<div class="dpad">

<div class="empty"></div>

<button
  class="pad-btn"
  data-key="ArrowUp"
>
↑
</button>

<div class="empty"></div>

<button
  class="pad-btn"
  data-key="ArrowLeft"
>
←
</button>

<button
  class="pad-btn"
  data-key="ArrowDown"
>
↓
</button>

<button
  class="pad-btn"
  data-key="ArrowRight"
>
→
</button>

</div>

<div class="ab-buttons">

<button
  class="ab-btn b-btn"
  data-key="x"
>
B
</button>

<button
  class="ab-btn a-btn"
  data-key="z"
>
A
</button>

</div>

</div>

<div class="bottom-controls">

<button
  class="btn small-btn"
  data-key="Shift"
>
SELECT
</button>

<button
  class="btn small-btn"
  data-key="Enter"
>
START
</button>

</div>

<div class="info">

Z = A • X = B • Enter = START • Shift = SELECT

</div>

</div>

<footer class="footer">
© 2026 blacknode305 • JSNES Emulator
</footer>

</div>

<script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>

<script>

const html =
  document.documentElement;

const themeToggle =
  document.getElementById('themeToggle');

const savedTheme =
  localStorage.getItem('theme') || 'dark';

setTheme(savedTheme);

themeToggle.addEventListener('click',()=>{

  const current =
    html.getAttribute('data-theme');

  const next =
    current === 'dark'
      ? 'light'
      : 'dark';

  setTheme(next);

});

function setTheme(theme){

  html.setAttribute(
    'data-theme',
    theme
  );

  localStorage.setItem(
    'theme',
    theme
  );

  themeToggle.textContent =
    theme === 'dark'
      ? '☀️'
      : '🌙';

}

const canvas =
  document.getElementById(
    'emulator'
  );

const ctx =
  canvas.getContext('2d');

canvas.width = 256;
canvas.height = 240;

const imageData =
  ctx.getImageData(
    0,
    0,
    256,
    240
  );

/* ======================
   AUDIO
====================== */

const audioContext =
  new (
    window.AudioContext ||
    window.webkitAudioContext
  )();

let scriptNode =
  audioContext.createScriptProcessor(
    1024,
    0,
    2
  );

scriptNode.connect(
  audioContext.destination
);

const nes =
  new jsnes.NES({

  onFrame(frameBuffer){

    for(let i = 0; i < frameBuffer.length; i++){

      const pixel =
        frameBuffer[i];

      imageData.data[i * 4 + 0] =
        (pixel >> 16) & 0xFF;

      imageData.data[i * 4 + 1] =
        (pixel >> 8) & 0xFF;

      imageData.data[i * 4 + 2] =
        pixel & 0xFF;

      imageData.data[i * 4 + 3] =
        0xFF;

    }

    ctx.putImageData(
      imageData,
      0,
      0
    );

  },

  onAudioSample(left,right){

    // звук активирован
  }

});

let romData = null;
let running = false;

/* ======================
   ROM LOAD
====================== */

document.getElementById(
  'romInput'
).addEventListener(
  'change',
  function(e){

  const file =
    e.target.files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload =
    function(){

      romData =
        reader.result;

      alert(
        'ROM загружен'
      );

    };

  reader.readAsBinaryString(file);

});

/* ======================
   START
====================== */

document.getElementById(
  'startBtn'
).addEventListener(
  'click',
  async function(){

  if(!romData){

    alert(
      'Сначала выбери ROM'
    );

    return;

  }

  await audioContext.resume();

  nes.loadROM(romData);

  if(running) return;

  running = true;

  function frame(){

    nes.frame();

    requestAnimationFrame(frame);

  }

  frame();

});

/* ======================
   FULLSCREEN
====================== */

document.getElementById(
  'fullscreenBtn'
).addEventListener(
  'click',
  ()=>{

  canvas.requestFullscreen();

});

/* ======================
   KEYMAP
====================== */

const keyboardMap = {

  ArrowUp:
    jsnes.Controller.BUTTON_UP,

  ArrowDown:
    jsnes.Controller.BUTTON_DOWN,

  ArrowLeft:
    jsnes.Controller.BUTTON_LEFT,

  ArrowRight:
    jsnes.Controller.BUTTON_RIGHT,

  z:
    jsnes.Controller.BUTTON_A,

  x:
    jsnes.Controller.BUTTON_B,

  Enter:
    jsnes.Controller.BUTTON_START,

  Shift:
    jsnes.Controller.BUTTON_SELECT

};

function pressKey(key){

  const btn =
    keyboardMap[key];

  if(btn !== undefined){

    nes.buttonDown(
      1,
      btn
    );

  }

}

function releaseKey(key){

  const btn =
    keyboardMap[key];

  if(btn !== undefined){

    nes.buttonUp(
      1,
      btn
    );

  }

}

/* ======================
   KEYBOARD
====================== */

document.addEventListener(
  'keydown',
  e=>{

  pressKey(e.key);

});

document.addEventListener(
  'keyup',
  e=>{

  releaseKey(e.key);

});

/* ======================
   TOUCH BUTTONS
====================== */

document.querySelectorAll(
  '[data-key]'
).forEach(button=>{

  const key =
    button.dataset.key;

  const start = ()=>{

    button.classList.add(
      'active'
    );

    pressKey(key);

  };

  const end = ()=>{

    button.classList.remove(
      'active'
    );

    releaseKey(key);

  };

  button.addEventListener(
    'touchstart',
    e=>{

      e.preventDefault();

      start();

    }
  );

  button.addEventListener(
    'touchend',
    end
  );

  button.addEventListener(
    'mousedown',
    start
  );

  button.addEventListener(
    'mouseup',
    end
  );

  button.addEventListener(
    'mouseleave',
    end
  );

});

</script>

</body>
</html>

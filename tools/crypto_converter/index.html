<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Демо-торговля</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{background:#0a0a0f;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .phone{width:375px;height:812px;background:#12121a;border-radius:40px;padding:12px;display:flex;flex-direction:column}
  .status-bar{display:flex;justify-content:space-between;padding:8px 20px;font-size:14px;font-weight:600}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-size:18px;font-weight:600}
  .content{flex:1;padding:0 20px;overflow-y:auto}
  .positive{color:#4ade80}
  .chart{height:200px;background:linear-gradient(180deg,rgba(139,92,246,0.2) 0%,transparent 100%);border-radius:12px;margin:20px 0}
  .btn-group{display:flex;gap:12px;margin-top:20px}
  .btn{flex:1;padding:16px;border-radius:12px;border:none;font-weight:600;font-size:16px}
  .btn-green{background:#22c55e;color:#fff}
  .btn-red{background:#ef4444;color:#fff}
  .bonus-card{background:#1a1a24;border-radius:16px;padding:20px;display:flex;gap:16px;align-items:center;margin-top:20px}
  .tab-bar{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid #2a2a35;background:#12121a}
  .tab{text-align:center;font-size:12px;color:#6b7280}
  .tab.active{color:#8b5cf6}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>📶 📶 🔋</span></div>
  <div class="header"><span>Демо-торговля</span><span style="background:#22c55e;padding:8px 16px;border-radius:8px">Пополнить</span></div>
  <div class="content">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div>🟠 BTC/USDT</div><div class="positive">67,892.45 <span style="font-size:14px">+1.25%</span></div></div>
    </div>
    <div class="chart"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0">
      <div><div style="color:#9ca3af;font-size:14px">Баланс</div><div>10 000.00 $</div></div>
      <div><div style="color:#9ca3af;font-size:14px">Средства</div><div>10 000.00 $</div></div>
      <div><div style="color:#9ca3af;font-size:14px">Прибыль</div><div class="positive">0.00 $</div></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-green">↑ Купить<br>67,892.46</button>
      <button class="btn btn-red">↓ Продать<br>67,892.45</button>
    </div>
    <div class="bonus-card">
      <div>🎁</div>
      <div style="flex:1">
        <div style="font-weight:600">Смотри рекламу – получай бонусы!</div>
        <div style="color:#9ca3af;font-size:14px;margin-top:4px">Доступно бонусов: 3<br><span class="positive">+1 000 $</span></div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active">📈<br>Торговля</div>
    <div class="tab">💼<br>Портфель</div>
    <div class="tab">⏱️<br>История</div>
    <div class="tab">🎁<br>Бонусы</div>
    <div class="tab">👤<br>Профиль</div>
  </div>
</div>
</body>
</html>

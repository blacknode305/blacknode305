<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Converter</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{background:#0a0a0f;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .phone{width:375px;height:812px;background:#12121a;border-radius:40px;padding:12px;display:flex;flex-direction:column}
  .status-bar{display:flex;justify-content:space-between;padding:8px 20px;font-size:14px;font-weight:600}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-size:18px;font-weight:600}
  .content{flex:1;padding:0 20px;overflow-y:auto}
  .btn-group{display:flex;gap:12px;margin-bottom:20px}
  .btn{flex:1;padding:16px;border-radius:12px;border:none;font-weight:600;font-size:16px}
  .btn-purple{background:#8b5cf6;color:#fff}
  .input-card{background:#1a1a24;border-radius:16px;padding:20px;margin-bottom:16px}
  .positive{color:#4ade80}
  .negative{color:#f87171}
  .tab-bar{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid #2a2a35;background:#12121a}
  .tab{text-align:center;font-size:12px;color:#6b7280}
  .tab.active{color:#8b5cf6}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>📶 📶 🔋</span></div>
  <div class="header"><span>Alpha Converter</span><span>☰</span></div>
  <div class="content">
    <div class="btn-group">
      <button class="btn btn-purple">Currency</button>
      <button class="btn" style="background:#1a1a24">Crypto</button>
    </div>
    <div class="input-card">
      <div style="color:#9ca3af;font-size:14px">From</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <span>🇺🇸 USD</span><span style="font-size:24px">1,000</span>
      </div>
    </div>
    <div style="text-align:center;margin:16px 0">⇅</div>
    <div class="input-card">
      <div style="color:#9ca3af;font-size:14px">To</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <span>🇪🇺 EUR</span><span style="font-size:24px">922.41</span>
      </div>
    </div>
    <div style="margin:20px 0">
      <div style="color:#9ca3af">Exchange Rate</div>
      <div>1 USD = 0.92241 EUR <span class="positive">+0.35%</span></div>
    </div>
    <button class="btn btn-purple" style="width:100%">Convert</button>
  </div>
  <div class="tab-bar">
    <div class="tab active">🔄<br>Convert</div>
    <div class="tab">📈<br>Rates</div>
    <div class="tab">❤️<br>Favorites</div>
    <div class="tab">⏱️<br>History</div>
    <div class="tab">⚙️<br>Settings</div>
  </div>
</div>
</body>
</html>

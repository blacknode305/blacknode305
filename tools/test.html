<!DOCTYPE html><html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Демо трейдинг</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #050816;
      font-family: Inter, sans-serif;
    }.glass {
  background: rgba(18, 24, 45, 0.92);
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
}

.chart-bg {
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.candle-green {
  background: #22c55e;
}

.candle-red {
  background: #ef4444;
}

.bottom-nav-item.active {
  color: #22c55e;
}

  </style>
</head>
<body class="text-white min-h-screen flex justify-center py-4 px-2">  <div class="w-full max-w-sm rounded-[40px] overflow-hidden bg-[#070b1a] border border-white/10 shadow-2xl"><!-- Header -->
<div class="p-4 flex items-center justify-between">
  <div>
    <div class="text-2xl font-bold">Демо-торговля</div>
    <div class="text-green-400 text-sm">Демо счёт</div>
  </div>

  <div class="flex gap-2 items-center">
    <div class="glass rounded-2xl px-4 py-2 text-right">
      <div class="text-lg font-semibold">10 000 $</div>
      <div class="text-xs text-gray-400">Баланс</div>
    </div>

    <button class="bg-green-500 hover:bg-green-400 transition px-4 py-3 rounded-2xl font-semibold">
      +
    </button>
  </div>
</div>

<!-- Pair -->
<div class="px-4 pb-3">
  <div class="glass rounded-3xl p-4 flex justify-between items-center">
    <div>
      <div class="text-xl font-bold">BTC/USDT</div>
      <div class="text-green-400 text-sm">67 892.45 (+1.25%)</div>
    </div>

    <div class="flex gap-2">
      <button class="w-11 h-11 rounded-xl bg-white/5">⚙️</button>
      <button class="w-11 h-11 rounded-xl bg-white/5">📊</button>
    </div>
  </div>
</div>

<!-- Chart -->
<div class="px-4">
  <div class="glass rounded-3xl p-4 chart-bg h-[300px] relative overflow-hidden">

    <!-- Fake Candles -->
    <div class="absolute inset-0 flex items-end gap-[6px] px-3 pb-6">
      <div class="w-2 h-20 candle-green rounded-full"></div>
      <div class="w-2 h-24 candle-red rounded-full"></div>
      <div class="w-2 h-28 candle-green rounded-full"></div>
      <div class="w-2 h-36 candle-green rounded-full"></div>
      <div class="w-2 h-32 candle-red rounded-full"></div>
      <div class="w-2 h-40 candle-green rounded-full"></div>
      <div class="w-2 h-44 candle-green rounded-full"></div>
      <div class="w-2 h-50 candle-green rounded-full"></div>
      <div class="w-2 h-42 candle-red rounded-full"></div>
      <div class="w-2 h-54 candle-green rounded-full"></div>
      <div class="w-2 h-60 candle-green rounded-full"></div>
      <div class="w-2 h-56 candle-red rounded-full"></div>
      <div class="w-2 h-70 candle-green rounded-full"></div>
      <div class="w-2 h-64 candle-red rounded-full"></div>
      <div class="w-2 h-80 candle-green rounded-full"></div>
      <div class="w-2 h-72 candle-green rounded-full"></div>
      <div class="w-2 h-88 candle-green rounded-full"></div>
      <div class="w-2 h-96 candle-red rounded-full"></div>
      <div class="w-2 h-110 candle-green rounded-full"></div>
    </div>

    <!-- Price -->
    <div class="absolute top-4 right-4 bg-green-500 text-black font-bold px-3 py-1 rounded-xl text-sm">
      67 892.45
    </div>

    <!-- Timeframe -->
    <div class="absolute bottom-3 left-3 right-3 flex justify-between text-xs text-gray-400">
      <span>1M</span>
      <span class="text-white">5M</span>
      <span>15M</span>
      <span>1H</span>
      <span>4H</span>
      <span>1D</span>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="px-4 mt-4">
  <div class="glass rounded-3xl p-4 grid grid-cols-2 gap-3 text-sm">

    <div>
      <div class="text-gray-400">Баланс</div>
      <div class="text-xl font-bold">10 000 $</div>
    </div>

    <div>
      <div class="text-gray-400">Прибыль</div>
      <div class="text-xl font-bold text-green-400">0.00 $</div>
    </div>

    <div>
      <div class="text-gray-400">Плечо</div>
      <div class="text-xl font-bold">10x</div>
    </div>

    <div>
      <div class="text-gray-400">Позиция</div>
      <div class="text-xl font-bold">0.01</div>
    </div>
  </div>
</div>

<!-- Buy Sell -->
<div class="px-4 mt-4 grid grid-cols-2 gap-3">
  <button class="bg-green-500 hover:bg-green-400 transition rounded-3xl py-5 text-xl font-bold">
    Купить
  </button>

  <button class="bg-red-500 hover:bg-red-400 transition rounded-3xl py-5 text-xl font-bold">
    Продать
  </button>
</div>

<!-- Rewards -->
<div class="px-4 mt-4 mb-6">
  <div class="glass rounded-3xl p-5">

    <div class="text-2xl font-bold mb-1">
      Бонусы за рекламу
    </div>

    <div class="text-gray-400 text-sm mb-4">
      Получай демо баланс за просмотр короткой рекламы
    </div>

    <div class="flex items-center gap-4 mb-5">
      <div class="text-6xl">🎁</div>

      <div>
        <div class="text-gray-400 text-sm">Доступно бонусов</div>
        <div class="text-green-400 text-3xl font-bold">+1000 $</div>
      </div>
    </div>

    <button class="w-full bg-violet-600 hover:bg-violet-500 transition rounded-2xl py-4 text-lg font-semibold">
      ▶ Смотреть рекламу
    </button>
  </div>
</div>

<!-- Bottom Nav -->
<div class="border-t border-white/10 bg-[#050816] px-3 py-3 flex justify-between text-xs text-gray-500">

  <div class="bottom-nav-item active flex flex-col items-center gap-1">
    <div>📈</div>
    <div>Торговля</div>
  </div>

  <div class="bottom-nav-item flex flex-col items-center gap-1">
    <div>💼</div>
    <div>Портфель</div>
  </div>

  <div class="bottom-nav-item flex flex-col items-center gap-1">
    <div>🕓</div>
    <div>История</div>
  </div>

  <div class="bottom-nav-item flex flex-col items-center gap-1">
    <div>🎁</div>
    <div>Бонусы</div>
  </div>

  <div class="bottom-nav-item flex flex-col items-center gap-1">
    <div>👤</div>
    <div>Профиль</div>
  </div>

</div>

  </div></body>
</html>

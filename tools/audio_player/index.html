<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>blacknode305 • Audio Player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f0f13;

  --accent:#8b5cf6;
  --accent2:#06b6d4;

  --card:rgba(20,20,28,.72);

  --text:#ffffff;
  --muted:#9aa0b4;

  --border:rgba(255,255,255,.08);
}

body{
  min-height:100vh;

  overflow:hidden;

  font-family:'Inter',sans-serif;

  background:var(--bg);

  color:var(--text);

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  position:relative;
}

body::before{
  content:'';

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,.16), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.16), transparent 40%);

  z-index:-2;
}

#bg{
  position:fixed;
  inset:0;

  z-index:-1;
}

.player{
  width:min(94vw,520px);

  background:var(--card);

  border:1px solid var(--border);

  border-radius:32px;

  padding:30px 24px;

  backdrop-filter:blur(24px);

  box-shadow:
    0 10px 40px rgba(0,0,0,.45),
    0 0 40px rgba(139,92,246,.12);

  text-align:center;
}

.logo{
  font-family:'Space Grotesk',sans-serif;

  font-size:28px;
  font-weight:700;

  margin-bottom:18px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* =========================
   CIRCLE VISUALIZER
========================= */

.visual-circle-wrap{

  width:240px;
  height:240px;

  margin:auto;

  position:relative;

  display:flex;
  justify-content:center;
  align-items:center;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(139,92,246,.18),
      rgba(6,182,212,.08),
      transparent
    );

  box-shadow:
    0 0 50px rgba(139,92,246,.22);

  animation:float 5s ease-in-out infinite;
}

#circleVisualizer{

  width:100%;
  height:100%;

  border-radius:50%;
}

h1{
  margin-top:22px;

  font-size:2.2rem;
  font-weight:800;

  letter-spacing:-1px;
}

.bio{
  margin-top:8px;

  color:var(--muted);

  line-height:1.6;
}

.track-box{
  margin-top:24px;

  padding:18px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.05),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(255,255,255,.06);
}

.track-box span{
  display:block;

  margin-bottom:6px;

  font-size:.72rem;

  letter-spacing:2px;

  color:#b69cff;
}

.track-name{
  font-size:1rem;
  font-weight:700;

  word-break:break-word;
}

.progress-wrap{
  margin-top:20px;
}

.progress{
  width:100%;
  height:8px;

  border-radius:999px;

  background:rgba(255,255,255,.08);

  overflow:hidden;
}

.progress-bar{
  width:0%;
  height:100%;

  background:
    linear-gradient(
      90deg,
      var(--accent),
      var(--accent2)
    );

  border-radius:999px;
}

.time{
  margin-top:8px;

  display:flex;
  justify-content:space-between;

  font-size:.82rem;

  color:var(--muted);
}

.controls{
  margin-top:24px;

  display:flex;
  justify-content:center;
  align-items:center;

  gap:14px;
}

.btn{
  border:none;
  outline:none;

  cursor:pointer;

  width:60px;
  height:60px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.08),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(255,255,255,.08);

  color:#fff;

  font-size:1.2rem;

  transition:.2s ease;
}

.btn:hover{
  transform:translateY(-4px);
}

.btn:active{
  transform:scale(.92);
}

.play{
  width:74px;
  height:74px;

  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  font-size:1.5rem;

  box-shadow:
    0 10px 30px rgba(139,92,246,.35);
}

.upload{
  margin-top:24px;
}

.file-label{
  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:14px 20px;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  color:white;

  font-weight:700;

  cursor:pointer;

  transition:.25s ease;
}

.file-label:hover{
  transform:translateY(-3px);
}

.file-label input{
  display:none;
}

.footer{
  margin-top:24px;

  color:#6b7280;

  font-size:.82rem;
}

@keyframes float{

  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }

}

@media(max-width:700px){

  .player{
    padding:24px 18px;
  }

  h1{
    font-size:1.9rem;
  }

  .visual-circle-wrap{
    width:210px;
    height:210px;
  }

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="player">

  <div class="logo">
    blacknode305
  </div>

  <div class="visual-circle-wrap">

    <canvas id="circleVisualizer"></canvas>

  </div>

  <h1>
    Audio Player
  </h1>

  <div class="bio">
    Cyber Visualizer • Web Audio API • Local Files
  </div>

  <div class="track-box">

    <span>
      NOW PLAYING
    </span>

    <div
      class="track-name"
      id="trackName"
    >
      Нет выбранного трека
    </div>

  </div>

  <div class="progress-wrap">

    <div class="progress">

      <div
        class="progress-bar"
        id="progressBar"
      ></div>

    </div>

    <div class="time">

      <div id="currentTime">
        0:00
      </div>

      <div id="duration">
        0:00
      </div>

    </div>

  </div>

  <div class="controls">

    <button
      class="btn"
      id="prevBtn"
    >
      ⏮
    </button>

    <button
      class="btn play"
      id="playBtn"
    >
      ▶
    </button>

    <button
      class="btn"
      id="nextBtn"
    >
      ⏭
    </button>

  </div>

  <div class="upload">

    <label class="file-label">

      Выбрать музыку

      <input
        type="file"
        id="fileInput"
        accept="audio/*"
        multiple
      >

    </label>

  </div>

  <div class="footer">
    BLACKNODE305 © 2026
  </div>

</div>

<audio id="audio"></audio>

<script>

/* =========================
   BACKGROUND
========================= */

const canvas =
  document.getElementById('bg');

const ctx =
  canvas.getContext('2d');

function resizeCanvas(){

  canvas.width =
    window.innerWidth;

  canvas.height =
    window.innerHeight;

}

resizeCanvas();

window.addEventListener(
  'resize',
  resizeCanvas
);

/* =========================
   AUDIO
========================= */

const audio =
  document.getElementById(
    'audio'
  );

const audioCtx =
  new (
    window.AudioContext ||
    window.webkitAudioContext
  )();

const analyser =
  audioCtx.createAnalyser();

analyser.fftSize = 256;

const source =
  audioCtx.createMediaElementSource(
    audio
  );

source.connect(analyser);

analyser.connect(
  audioCtx.destination
);

const bufferLength =
  analyser.frequencyBinCount;

const dataArray =
  new Uint8Array(bufferLength);

/* =========================
   PLAYLIST
========================= */

let playlist = [];

let currentTrack = 0;

/* =========================
   ELEMENTS
========================= */

const trackName =
  document.getElementById(
    'trackName'
  );

const playBtn =
  document.getElementById(
    'playBtn'
  );

const nextBtn =
  document.getElementById(
    'nextBtn'
  );

const prevBtn =
  document.getElementById(
    'prevBtn'
  );

const progressBar =
  document.getElementById(
    'progressBar'
  );

const currentTimeText =
  document.getElementById(
    'currentTime'
  );

const durationText =
  document.getElementById(
    'duration'
  );

/* =========================
   FILE INPUT
========================= */

document.getElementById(
  'fileInput'
).addEventListener(
  'change',
  function(e){

  const files =
    [...e.target.files];

  if(!files.length)
    return;

  playlist = files;

  currentTrack = 0;

  loadTrack(currentTrack);

});

/* =========================
   LOAD TRACK
========================= */

function loadTrack(index){

  const file =
    playlist[index];

  if(!file)
    return;

  const url =
    URL.createObjectURL(file);

  audio.src = url;

  trackName.innerText =
    file.name;

  playTrack();

}

/* =========================
   PLAY
========================= */

async function playTrack(){

  if(
    audioCtx.state === 'suspended'
  ){

    await audioCtx.resume();

  }

  audio.play();

  playBtn.innerHTML = '❚❚';

}

/* =========================
   PAUSE
========================= */

function pauseTrack(){

  audio.pause();

  playBtn.innerHTML = '▶';

}

/* =========================
   TOGGLE
========================= */

playBtn.addEventListener(
  'click',
  ()=>{

  if(audio.paused){

    playTrack();

  }else{

    pauseTrack();

  }

});

/* =========================
   NEXT
========================= */

nextBtn.addEventListener(
  'click',
  ()=>{

  if(!playlist.length)
    return;

  currentTrack++;

  if(
    currentTrack >= playlist.length
  ){

    currentTrack = 0;

  }

  loadTrack(currentTrack);

});

/* =========================
   PREV
========================= */

prevBtn.addEventListener(
  'click',
  ()=>{

  if(!playlist.length)
    return;

  currentTrack--;

  if(currentTrack < 0){

    currentTrack =
      playlist.length - 1;

  }

  loadTrack(currentTrack);

});

/* =========================
   AUTO NEXT
========================= */

audio.addEventListener(
  'ended',
  ()=>{

  nextBtn.click();

});

/* =========================
   TIME
========================= */

function formatTime(sec){

  if(isNaN(sec))
    return '0:00';

  const minutes =
    Math.floor(sec / 60);

  const seconds =
    Math.floor(sec % 60)
      .toString()
      .padStart(2,'0');

  return `${minutes}:${seconds}`;

}

audio.addEventListener(
  'timeupdate',
  ()=>{

  const progress =
    (
      audio.currentTime /
      audio.duration
    ) * 100;

  progressBar.style.width =
    `${progress || 0}%`;

  currentTimeText.innerText =
    formatTime(
      audio.currentTime
    );

  durationText.innerText =
    formatTime(
      audio.duration
    );

});

/* =========================
   PARTICLES
========================= */

const particles = [];

for(let i = 0; i < 120; i++){

  particles.push({

    x:
      Math.random() *
      window.innerWidth,

    y:
      Math.random() *
      window.innerHeight,

    size:
      Math.random() * 3 + 1,

    speed:
      Math.random() * .7 + .2,

    alpha:
      Math.random()

  });

}

function drawBackground(){

  requestAnimationFrame(
    drawBackground
  );

  ctx.fillStyle =
    'rgba(7,10,16,.20)';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  particles.forEach(p=>{

    p.y -= p.speed;

    if(p.y < -10){

      p.y =
        canvas.height + 10;

      p.x =
        Math.random() *
        canvas.width;

    }

    ctx.beginPath();

    ctx.fillStyle =
      `rgba(6,182,212,${
        p.alpha * .35
      })`;

    ctx.arc(
      p.x,
      p.y,
      p.size,
      0,
      Math.PI * 2
    );

    ctx.fill();

  });

}

drawBackground();

/* =========================
   CIRCLE VISUALIZER
========================= */

const circleCanvas =
  document.getElementById(
    'circleVisualizer'
  );

const circleCtx =
  circleCanvas.getContext('2d');

function resizeCircle(){

  circleCanvas.width = 240;
  circleCanvas.height = 240;

}

resizeCircle();

function drawCircleVisualizer(){

  requestAnimationFrame(
    drawCircleVisualizer
  );

  analyser.getByteFrequencyData(
    dataArray
  );

  circleCtx.clearRect(
    0,
    0,
    circleCanvas.width,
    circleCanvas.height
  );

  const cx =
    circleCanvas.width / 2;

  const cy =
    circleCanvas.height / 2;

  const radius = 65;

  const bars = 120;

  for(let i = 0; i < bars; i++){

    const value =
      dataArray[i];

    const percent =
      value / 255;

    const barHeight =
      20 + percent * 50;

    const angle =
      (Math.PI * 2 / bars) * i;

    const x1 =
      cx + Math.cos(angle) * radius;

    const y1 =
      cy + Math.sin(angle) * radius;

    const x2 =
      cx + Math.cos(angle) *
      (radius + barHeight);

    const y2 =
      cy + Math.sin(angle) *
      (radius + barHeight);

    const gradient =
      circleCtx.createLinearGradient(
        x1,
        y1,
        x2,
        y2
      );

    gradient.addColorStop(
      0,
      '#8b5cf6'
    );

    gradient.addColorStop(
      1,
      '#06b6d4'
    );

    circleCtx.strokeStyle =
      gradient;

    circleCtx.lineWidth = 4;

    circleCtx.lineCap =
      'round';

    circleCtx.beginPath();

    circleCtx.moveTo(
      x1,
      y1
    );

    circleCtx.lineTo(
      x2,
      y2
    );

    circleCtx.stroke();

  }

  const glow =
    circleCtx.createRadialGradient(
      cx,
      cy,
      10,
      cx,
      cy,
      70
    );

  glow.addColorStop(
    0,
    'rgba(139,92,246,.35)'
  );

  glow.addColorStop(
    1,
    'rgba(0,0,0,0)'
  );

  circleCtx.fillStyle =
    glow;

  circleCtx.beginPath();

  circleCtx.arc(
    cx,
    cy,
    70,
    0,
    Math.PI * 2
  );

  circleCtx.fill();

}

drawCircleVisualizer();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>blacknode305 - Проигрыватель</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#070b14;

  --accent:#ff7a00;
  --accent2:#ff3d81;
  --accent3:#00d4ff;

  --glass:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);

  --text:#ffffff;
  --muted:#9ca3af;
}

/* =========================
   BODY
========================= */

body{
  min-height:100vh;
  overflow:hidden;

  font-family:'Inter',sans-serif;

  background:
    radial-gradient(circle at top left, rgba(255,122,0,.12), transparent 30%),
    radial-gradient(circle at top right, rgba(0,212,255,.10), transparent 30%),
    radial-gradient(circle at bottom, rgba(255,61,129,.10), transparent 35%),
    var(--bg);

  color:var(--text);

  display:flex;
  justify-content:center;
  align-items:center;

  position:relative;
}

/* =========================
   CANVAS
========================= */

#bg{
  position:fixed;
  inset:0;
  z-index:-2;
}

/* =========================
   GLASS CARD
========================= */

.player{
  width:min(92vw, 500px);

  padding:34px 28px;

  border-radius:30px;

  background:rgba(10,15,25,.55);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  box-shadow:
    0 10px 40px rgba(0,0,0,.45),
    0 0 50px rgba(255,122,0,.08);

  text-align:center;

  animation:show 1s ease forwards;
}

/* =========================
   AVATAR
========================= */

.avatar{
  width:130px;
  height:130px;

  margin:auto;

  border-radius:50%;

  padding:4px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2),
      var(--accent3)
    );

  box-shadow:
    0 0 40px rgba(255,122,0,.28);

  animation:float 5s ease-in-out infinite;
}

.avatar img{
  width:100%;
  height:100%;

  border-radius:50%;

  object-fit:cover;
}

/* =========================
   TEXT
========================= */

h1{
  margin-top:18px;

  font-size:2.5rem;
  font-weight:800;

  letter-spacing:-1px;

  background:
    linear-gradient(
      90deg,
      #fff,
      #ffb067,
      #ffffff
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.bio{
  margin-top:8px;

  color:var(--muted);

  font-size:.95rem;
  font-weight:500;
}

/* =========================
   NOW PLAYING
========================= */

.track-name{
  margin-top:24px;

  padding:16px 18px;

  border-radius:20px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(255,255,255,.06);

  font-weight:700;

  box-shadow:
    inset 0 0 20px rgba(255,255,255,.02);
}

.track-name span{
  display:block;

  margin-bottom:6px;

  font-size:.72rem;
  letter-spacing:2px;

  color:#ffb067;
}

/* =========================
   CONTROLS
========================= */

.controls{
  margin-top:24px;

  display:flex;
  justify-content:center;
  align-items:center;

  gap:14px;
}

.btn{
  border:none;
  outline:none;

  cursor:pointer;

  width:58px;
  height:58px;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      rgba(255,255,255,.08),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(255,255,255,.08);

  color:#fff;

  font-size:1.2rem;

  transition:.25s ease;

  backdrop-filter:blur(12px);
}

.btn:hover{
  transform:translateY(-4px) scale(1.06);

  box-shadow:
    0 10px 25px rgba(255,122,0,.25);

  border-color:rgba(255,122,0,.4);
}

.btn.play{
  width:72px;
  height:72px;

  border-radius:24px;

  background:
    linear-gradient(
      135deg,
      var(--accent),
      var(--accent2)
    );

  font-size:1.4rem;

  box-shadow:
    0 12px 30px rgba(255,122,0,.35);
}

/* =========================
   FOOTER
========================= */

.footer{
  margin-top:24px;

  color:#6b7280;

  font-size:.82rem;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes show{
  from{
    opacity:0;
    transform:translateY(30px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes float{
  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-8px);
  }
}

/* =========================
   MOBILE
========================= */

@media(max-width:700px){

  .player{
    padding:28px 18px;
  }

  h1{
    font-size:2rem;
  }

  .avatar{
    width:110px;
    height:110px;
  }

}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="player">

  <div class="avatar">
    <img src="https://github.com/blacknode305.png" alt="">
  </div>

  <h1>blacknode305</h1>

  <div class="bio">
    Cyber Audio Visualizer • Dubstep UI • Web Audio API
  </div>

  <div class="track-name" id="trackName">
    <span>NOW PLAYING</span>
    Loading...
  </div>

  <div class="controls">

    <button class="btn" id="prevBtn">
      ⏮
    </button>

    <button class="btn play" id="playBtn">
      ▶
    </button>

    <button class="btn" id="nextBtn">
      ⏭
    </button>

  </div>

  <div class="footer">
    BLACKNODE305 © 2026
  </div>

</div>

<audio id="music"></audio>

<script>

// ===============================
// CANVAS
// ===============================

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();

window.addEventListener('resize', resizeCanvas);

// ===============================
// AUDIO
// ===============================

const audio = document.getElementById('music');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const analyser = audioCtx.createAnalyser();

analyser.fftSize = 512;

const source = audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

const bufferLength = analyser.frequencyBinCount;

const dataArray = new Uint8Array(bufferLength);

// ===============================
// PLAYLIST
// ===============================

const playlist = [

  './../../src/audio/Bad Legs - Repeat.mp3',

  './../../src/audio/Big Florida - TURN IT.mp3',

  './../../src/audio/GANGSTER ON WHEELS - Power.mp3',

  './../../src/audio/Katana Zero - All For Now.mp3',

  './../../src/audio/Airixis - Universe.mp3',

  './../../src/audio/Katana ZERO - Rain On Brick.mp3',

  './../../src/audio/Katana Zero - Full Confession.mp3'

];

let currentTrack = 0;

// ===============================
// ELEMENTS
// ===============================

const trackName = document.getElementById('trackName');

const playBtn = document.getElementById('playBtn');

const nextBtn = document.getElementById('nextBtn');

const prevBtn = document.getElementById('prevBtn');

// ===============================
// TRACK NAME
// ===============================

function updateTrackName(){

  const name = playlist[currentTrack]
    .split('/')
    .pop()
    .replace('.mp3','');

  trackName.innerHTML = `
    <span>NOW PLAYING</span>
    ${name}
  `;

}

// ===============================
// PLAY TRACK
// ===============================

function playTrack(index){

  audio.src = playlist[index];

  updateTrackName();

  audio.play()
    .then(() => {
      playBtn.innerHTML = '❚❚';
    })
    .catch(err => {
      console.log(err);
    });

}

// ===============================
// PLAY / PAUSE
// ===============================

function togglePlay(){

  if(audio.paused){

    audio.play();

    playBtn.innerHTML = '❚❚';

  }else{

    audio.pause();

    playBtn.innerHTML = '▶';

  }

}

// ===============================
// NEXT
// ===============================

function nextTrack(){

  currentTrack++;

  if(currentTrack >= playlist.length){
    currentTrack = 0;
  }

  playTrack(currentTrack);

}

// ===============================
// PREV
// ===============================

function prevTrack(){

  currentTrack--;

  if(currentTrack < 0){
    currentTrack = playlist.length - 1;
  }

  playTrack(currentTrack);

}

// ===============================
// EVENTS
// ===============================

playBtn.addEventListener('click', async () => {

  if(audioCtx.state === 'suspended'){
    await audioCtx.resume();
  }

  togglePlay();

});

nextBtn.addEventListener('click', nextTrack);

prevBtn.addEventListener('click', prevTrack);

audio.addEventListener('ended', nextTrack);

// ===============================
// PARTICLES
// ===============================

const particles = [];

for(let i = 0; i < 100; i++){

  particles.push({

    x: Math.random() * window.innerWidth,

    y: Math.random() * window.innerHeight,

    size: Math.random() * 3 + 1,

    speed: Math.random() * 0.8 + 0.2,

    alpha: Math.random()

  });

}

// ===============================
// PARTICLES DRAW
// ===============================

function drawParticles(){

  particles.forEach(p => {

    p.y -= p.speed;

    if(p.y < -10){

      p.y = canvas.height + 10;

      p.x = Math.random() * canvas.width;

    }

    ctx.beginPath();

    ctx.fillStyle = `rgba(0,212,255,${p.alpha * 0.35})`;

    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

    ctx.fill();

  });

}

// ===============================
// GRID
// ===============================

function drawGrid(){

  ctx.strokeStyle = 'rgba(255,255,255,.03)';
  ctx.lineWidth = 1;

  for(let x = 0; x < canvas.width; x += 40){

    ctx.beginPath();

    ctx.moveTo(x,0);

    ctx.lineTo(x,canvas.height);

    ctx.stroke();

  }

  for(let y = 0; y < canvas.height; y += 40){

    ctx.beginPath();

    ctx.moveTo(0,y);

    ctx.lineTo(canvas.width,y);

    ctx.stroke();

  }

}

// ===============================
// WAVES
// ===============================

function drawWaves(){

  const time = Date.now() * 0.0015;

  for(let layer = 0; layer < 4; layer++){

    ctx.beginPath();

    for(let x = 0; x < canvas.width; x += 6){

      const y =
        canvas.height / 2 +
        Math.sin(x * 0.012 + time + layer) *
        (16 + layer * 8);

      if(x === 0){
        ctx.moveTo(x,y);
      }else{
        ctx.lineTo(x,y);
      }

    }

    ctx.strokeStyle =
      `rgba(0,212,255,${0.04 + layer * 0.03})`;

    ctx.lineWidth = 2;

    ctx.stroke();

  }

}

// ===============================
// CENTER GLOW
// ===============================

function drawCenterGlow(avg){

  const gradient = ctx.createRadialGradient(
    canvas.width/2,
    canvas.height/2,
    20,
    canvas.width/2,
    canvas.height/2,
    280
  );

  gradient.addColorStop(
    0,
    `rgba(255,122,0,${0.15 + avg * 0.002})`
  );

  gradient.addColorStop(
    0.5,
    `rgba(255,61,129,${0.08 + avg * 0.001})`
  );

  gradient.addColorStop(
    1,
    `rgba(0,0,0,0)`
  );

  ctx.fillStyle = gradient;

  ctx.fillRect(0,0,canvas.width,canvas.height);

}

// ===============================
// BARS
// ===============================

function drawBars(){

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  const visibleBars = 90;

  const barWidth = 6;

  const gap = 3;

  let avg = 0;

  for(let i = 0; i < visibleBars; i++){

    const value = dataArray[i];

    avg += value;

    const percent = value / 255;

    const barHeight = percent * 150;

    const xLeft =
      centerX - (i * (barWidth + gap));

    const xRight =
      centerX + (i * (barWidth + gap));

    const gradient = ctx.createLinearGradient(
      0,
      centerY - barHeight,
      0,
      centerY + barHeight
    );

    gradient.addColorStop(0,'#00d4ff');
    gradient.addColorStop(.5,'#ff3d81');
    gradient.addColorStop(1,'#ff7a00');

    ctx.shadowBlur = 25;

    ctx.shadowColor = '#ff3d81';

    ctx.fillStyle = gradient;

    ctx.fillRect(
      xLeft,
      centerY - barHeight / 2,
      barWidth,
      barHeight
    );

    ctx.fillRect(
      xRight,
      centerY - barHeight / 2,
      barWidth,
      barHeight
    );

  }

  avg /= visibleBars;

  drawCenterGlow(avg);

  ctx.shadowBlur = 0;

}

// ===============================
// DRAW LOOP
// ===============================

function draw(){

  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(dataArray);

  ctx.fillStyle = 'rgba(7,10,16,.22)';

  ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  drawGrid();

  drawParticles();

  drawWaves();

  drawBars();

}

draw();

// ===============================
// START
// ===============================

playTrack(currentTrack);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>blacknode305 • Финансовый трекер</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f13;
  --card:rgba(20,20,28,.72);
  --text:#e8e8f0;
  --muted:#9aa0b4;

  --accent:#8b5cf6;
  --accent2:#06b6d4;

  --income:#22c55e;
  --expense:#ef4444;

  --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --card:rgba(255,255,255,.82);
  --text:#1e293b;
  --muted:#64748b;
  --border:rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:24px 14px;
  transition:.35s ease;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);
  z-index:-1;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.theme-toggle{
  width:46px;
  height:46px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}

.hero{
  margin-bottom:24px;
}

.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;
  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(24px);
}

.section-title{
  margin-bottom:14px;
  font-family:'Space Grotesk',sans-serif;
}

.controls{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.select{
  flex:1;
  min-width:120px;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  color:var(--text);
}

.btn{
  padding:12px 14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  color:#fff;
  font-weight:600;
}

.income-btn{
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

.expense-btn{
  background:linear-gradient(135deg,#ef4444,#dc2626);
}

.balance-card {
  margin-bottom:20px;
}
#balanceText{
  text-align:center;
}

.balance-value{
  font-size:42px;
  font-weight:700;
  margin-top:10px;
}

.balance-positive{color:var(--income);}
.balance-negative{color:var(--expense);}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid var(--border);
  padding:10px;
  text-align:center;
}

th{
  color:var(--muted);
  background:rgba(255,255,255,.03);
}

.badge{
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.badge-income{
  color:#22c55e;
  background:rgba(34,197,94,.15);
}

.badge-expense{
  color:#ef4444;
  background:rgba(239,68,68,.15);
}

.comment{
  font-size:12px;
  margin-top:6px;
  color:var(--muted);
}

.month-card{
  margin-bottom:20px;
}

.month-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.month-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  text-align:center;
}

.mini-label{
  color:var(--muted);
  margin-bottom:8px;
  font-size:14px;
}

@media(max-width:700px){

  .month-stats{
    grid-template-columns:1fr;
  }

}

.delete-btn{
  background:transparent;
  border:none;
  cursor:pointer;
  font-size:18px;
  color:var(--expense);
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <a href="https://blacknode305.github.io/blacknode305/" class="logo">blacknode305</a>
  <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
</div>

<div class="hero">
  <h1>Финансовый трекер</h1>
  <p>Доходы, расходы + комментарии</p>
</div>

<div class="grid">

  <div class="card">
    <h2 class="section-title">Доходы</h2>

    <div class="controls">
      <input id="incomeInput" class="select" type="number" placeholder="Сумма">
      <input id="incomeComment" class="select" type="text" placeholder="Комментарий">
      <button class="btn income-btn" onclick="addIncome()">Добавить</button>
    </div>
  </div>

  <div class="card">
    <h2 class="section-title">Расходы</h2>

    <div class="controls">
      <input id="expenseInput" class="select" type="number" placeholder="Сумма">
      <input id="expenseComment" class="select" type="text" placeholder="Комментарий">
      <button class="btn expense-btn" onclick="addExpense()">Добавить</button>
    </div>
  </div>

</div>

<div class="card balance-card">
  <h2 class="section-title">Остаток</h2>
  <div id="balanceText" class="balance-value">0</div>
</div>

<div class="card month-card">

  <div class="month-header">
    <h2 class="section-title">Статистика месяца</h2>

    <select id="monthSelect" class="select" onchange="update()">
      <option value="0">Январь</option>
      <option value="1">Февраль</option>
      <option value="2">Март</option>
      <option value="3">Апрель</option>
      <option value="4">Май</option>
      <option value="5">Июнь</option>
      <option value="6">Июль</option>
      <option value="7">Август</option>
      <option value="8">Сентябрь</option>
      <option value="9">Октябрь</option>
      <option value="10">Ноябрь</option>
      <option value="11">Декабрь</option>
    </select>

  </div>

  <div class="month-stats">

    <div>
      <div class="mini-label">Доход</div>
      <div id="monthIncome" class="balance-value balance-positive">0</div>
    </div>

    <div>
      <div class="mini-label">Расход</div>
      <div id="monthExpense" class="balance-value balance-negative">0</div>
    </div>

  </div>

</div>

<div class="card">

  <h2 class="section-title">История</h2>

  <table>
    <thead>
      <tr>
        <th></th>
        <th>Сумма</th>
        <th>Комментарий</th>
        <th>Дата</th>
        <th></th>
      </tr>
    </thead>

    <tbody id="historyTable"></tbody>
  </table>

</div>

</div>

<script>

let data =
  JSON.parse(localStorage.getItem('finance_data')) || [];

function save(){

  localStorage.setItem(
    'finance_data',
    JSON.stringify(data)
  );

}

function date(){

  const now = new Date();

  return {
    text: now.toLocaleString(),
    month: now.getMonth(),
    year: now.getFullYear()
  };

}

function addIncome(){

  const val = +incomeInput.value;

  if(!val) return;

  const d = date();

  data.unshift({
    type:'income',
    amount:val,
    comment:incomeComment.value || '',
    date:d.text,
    month:d.month,
    year:d.year
  });

  incomeInput.value='';
  incomeComment.value='';

  update();
}

function addExpense(){

  const val = +expenseInput.value;

  if(!val) return;

  const d = date();

  data.unshift({
    type:'expense',
    amount:val,
    comment:expenseComment.value || '',
    date:d.text,
    month:d.month,
    year:d.year
  });

  expenseInput.value='';
  expenseComment.value='';

  update();
}

function removeItem(index){

  data.splice(index,1);

  update();
}

function update(){

  save();

  let balance = 0;

  let monthIncome = 0;
  let monthExpense = 0;

  const now = new Date();

  const selectedMonth =
    +document.getElementById('monthSelect').value;

  const currentYear =
    now.getFullYear();

  const table =
    document.getElementById('historyTable');

  table.innerHTML = '';

  data.forEach((item,i)=>{

    balance +=
      item.type==='income'
        ? item.amount
        : -item.amount;

    if(
      item.month === selectedMonth &&
      item.year === currentYear
    ){

      if(item.type === 'income'){
        monthIncome += item.amount;
      }else{
        monthExpense += item.amount;
      }

    }

    const icon =
      item.type==='income'
        ? '🟢'
        : '🔴';

    const row =
      document.createElement('tr');

    row.innerHTML = `
      <td>${icon}</td>

      <td>
        ${
          item.type === 'income'
            ? '+'
            : '-'
        }${item.amount}
      </td>

      <td>
        ${item.comment || '-'}
      </td>

      <td>
        ${item.date}
      </td>

      <td>
        <button
          class="delete-btn"
          onclick="removeItem(${i})"
        >
          🗑
        </button>
      </td>
    `;

    table.appendChild(row);

  });

  const bal =
    document.getElementById('balanceText');

  bal.textContent = balance;

  bal.className =
    'balance-value ' +
    (
      balance >= 0
        ? 'balance-positive'
        : 'balance-negative'
    );

  document.getElementById(
    'monthIncome'
  ).textContent =
    '+' + monthIncome;

  document.getElementById(
    'monthExpense'
  ).textContent =
    '-' + monthExpense;

}

function toggleTheme(){

  document.documentElement.dataset.theme =
    document.documentElement.dataset.theme === 'dark'
      ? 'light'
      : 'dark';

}

document.getElementById(
  'monthSelect'
).value =
  new Date().getMonth();

update();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha Calendar</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{background:#0a0a0f;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .phone{width:375px;height:812px;background:#12121a;border-radius:40px;padding:12px;display:flex;flex-direction:column}
  .status-bar{display:flex;justify-content:space-between;padding:8px 20px;font-size:14px;font-weight:600}
  .header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;font-size:18px;font-weight:600}
  .content{flex:1;padding:0 20px;overflow-y:auto}
  .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;text-align:center;margin:20px 0}
  .calendar-day{padding:12px;border-radius:8px}
  .calendar-day.active{background:#8b5cf6}
  .shift-item{background:#1a1a24;border-radius:12px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
  .tab-bar{display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid #2a2a35;background:#12121a}
  .tab{text-align:center;font-size:12px;color:#6b7280}
  .tab.active{color:#8b5cf6}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>📶 📶 🔋</span></div>
  <div class="header"><span>Alpha Calendar</span><span>☰</span></div>
  <div class="content">
    <div style="text-align:center;font-weight:600;margin:20px 0">May 2024</div>
    <div class="calendar-grid">
      <div style="color:#6b7280">Mon</div><div style="color:#6b7280">Tue</div><div style="color:#6b7280">Wed</div>
      <div style="color:#6b7280">Thu</div><div style="color:#6b7280">Fri</div><div style="color:#6b7280">Sat</div><div style="color:#6b7280">Sun</div>
      <div>29</div><div>30</div><div>1</div><div>2</div><div>3</div><div>4</div><div>5</div>
      <div>6</div><div>7</div><div>8</div><div class="calendar-day active">15</div><div>10</div><div>11</div><div>12</div>
    </div>
    <h3 style="margin:24px 0 16px">Upcoming Shifts</h3>
    <div class="shift-item">
      <div><span class="dot" style="background:#22c55e"></span>Day Shift<br><span style="color:#9ca3af;font-size:14px">Wed, 15 May</span></div>
      <div>08:00 - 16:00</div>
    </div>
    <div class="shift-item">
      <div><span class="dot" style="background:#3b82f6"></span>Night Shift<br><span style="color:#9ca3af;font-size:14px">Thu, 16 May</span></div>
      <div>16:00 - 00:00</div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab active">📅<br>Calendar</div>
    <div class="tab">⏰<br>Shifts</div>
    <div class="tab">📊<br>Stats</div>
    <div class="tab">⚙️<br>Settings</div>
    <div class="tab">👤<br>Profile</div>
  </div>
</div>
</body>
</html>

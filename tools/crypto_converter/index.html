<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>blacknode305 • Crypto converter</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f13;
  --card:rgba(20,20,28,.72);
  --text:#e8e8f0;
  --muted:#9aa0b4;

  --accent:#f0b90b;
  --accent2:#ffdd57;

  --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --card:rgba(255,255,255,.82);
  --text:#1e293b;
  --muted:#64748b;

  --border:rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  background:var(--bg);
  color:var(--text);

  min-height:100vh;

  padding:24px 14px;

  transition:.35s ease;

  overflow-x:hidden;
}

body::before{
  content:'';

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(240,185,11,.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,221,87,.15), transparent 40%);

  z-index:-1;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:30px;
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.theme-toggle{
  width:46px;
  height:46px;

  border:none;
  border-radius:14px;

  cursor:pointer;

  background:var(--card);

  color:var(--text);

  font-size:18px;

  border:1px solid var(--border);

  backdrop-filter:blur(20px);

  transition:.25s ease;
}

.theme-toggle:hover{
  transform:scale(1.06);
}

.hero{
  margin-bottom:24px;
}

.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;

  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:22px;

  backdrop-filter:blur(24px);

  padding:18px;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;

  margin-bottom:18px;
}

select,
button,
input{
  border:none;
  outline:none;
}

.select{
  flex:1;

  min-width:130px;

  background:rgba(255,255,255,.04);

  border:1px solid var(--border);

  color:var(--text);

  padding:12px 14px;

  border-radius:14px;

  font-size:14px;
}

.btn{
  background:linear-gradient(135deg,var(--accent),var(--accent2));

  color:black;

  padding:12px 18px;

  border-radius:14px;

  font-weight:700;

  cursor:pointer;

  transition:.25s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.info{
  margin-bottom:16px;
  color:var(--muted);
  font-size:14px;
}

.rates-grid{
  display:grid;

  grid-template-columns:
    repeat(3,1fr);

  gap:10px;
}

.rate-card{
  background:rgba(255,255,255,.03);

  border:1px solid var(--border);

  border-radius:14px;

  padding:10px 12px;

  transition:.2s ease;

  min-height:72px;

  display:flex;
  flex-direction:column;
  justify-content:center;
}

.rate-card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.currency{
  font-size:12px;
  color:var(--muted);

  margin-bottom:6px;

  font-weight:500;
}

.value{
  font-size:16px;
  font-weight:700;

  word-break:break-word;
}

.section-title{
  margin-bottom:16px;
  font-family:'Space Grotesk',sans-serif;
}

.footer{
  margin-top:34px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

.loading{
  text-align:center;
  padding:20px;
  color:var(--muted);
}

@media(max-width:900px){

  .rates-grid{
    grid-template-columns:
      repeat(2,1fr);
  }

}

@media(max-width:520px){

  .hero h1{
    font-size:28px;
  }

  .rates-grid{
    grid-template-columns:
      repeat(3,1fr);

    gap:8px;
  }

  .rate-card{
    padding:8px;
    min-height:64px;
  }

  .currency{
    font-size:11px;
  }

  .value{
    font-size:13px;
  }

}

</style>
</head>
<body>

<div class="container">

<header class="header">

<div class="logo">
  <a href="https://blacknode305.github.io/blacknode305/" class="logo">blacknode305</a>
</div>

<button
  class="theme-toggle"
  id="themeToggle"
>
☀️
</button>

</header>

<section class="hero">

<h1>
Binance Crypto Rates
</h1>

<p>
Криптовалюты Binance в USDT
</p>

</section>

<div
  class="card"
  style="margin-top:22px;"
>

<h2 class="section-title">
Crypto Converter
</h2>

<div class="controls">

<input
  type="number"
  id="amountInput"
  class="select"
  placeholder="Количество"
  value="1"
/>

<select
  id="fromCurrency"
  class="select"
></select>

<select
  id="toCurrency"
  class="select"
></select>

<button
  class="btn"
  id="convertBtn"
>
Конвертировать
</button>

</div>

<div
  id="convertResult"
  class="info"
  style="font-size:18px;"
></div>

</div>

<div
  class="card"
  style="margin-top:22px;"
>

<h2 class="section-title">
Pinned Pairs
</h2>

<div class="controls">

<select
  id="pairFrom"
  class="select"
></select>

<select
  id="pairTo"
  class="select"
></select>

<button
  class="btn"
  id="savePairBtn"
>
Закрепить
</button>

</div>

<div
  class="rates-grid"
  id="savedPairs"
></div>

</div>

<main class="card" style="margin-top:22px;">

<div class="controls">

<button
  class="btn"
  id="loadBtn"
>
Обновить
</button>

</div>

<div
  class="info"
  id="info"
>
Загрузка...
</div>

<div
  class="rates-grid"
  id="ratesGrid"
></div>

</main>

<footer class="footer">
© 2026 blacknode305 • Binance API
</footer>

</div>

<script>

const html =
  document.documentElement;

const themeToggle =
  document.getElementById('themeToggle');

const savedTheme =
  localStorage.getItem('theme') || 'dark';

setTheme(savedTheme);

themeToggle.addEventListener('click',()=>{

  const current =
    html.getAttribute('data-theme');

  const next =
    current === 'dark'
      ? 'light'
      : 'dark';

  setTheme(next);

});

function setTheme(theme){

  html.setAttribute(
    'data-theme',
    theme
  );

  localStorage.setItem(
    'theme',
    theme
  );

  themeToggle.textContent =
    theme === 'dark'
      ? '☀️'
      : '🌙';

}

const API_URL =
  'https://api.binance.com/api/v3/ticker/price';

let latestPrices = {};

const loadBtn =
  document.getElementById('loadBtn');

const ratesGrid =
  document.getElementById('ratesGrid');

const info =
  document.getElementById('info');

const fromCurrency =
  document.getElementById('fromCurrency');

const toCurrency =
  document.getElementById('toCurrency');

const pairFrom =
  document.getElementById('pairFrom');

const pairTo =
  document.getElementById('pairTo');

const savePairBtn =
  document.getElementById('savePairBtn');

const savedPairs =
  document.getElementById('savedPairs');

const amountInput =
  document.getElementById('amountInput');

const convertBtn =
  document.getElementById('convertBtn');

const convertResult =
  document.getElementById('convertResult');

let selectedPairs =
  JSON.parse(
    localStorage.getItem(
      'savedPairs'
    )
  ) || [
    {
      from:'BTC',
      to:'USDT'
    },
    {
      from:'ETH',
      to:'USDT'
    },
    {
      from:'SOL',
      to:'USDT'
    }
  ];

async function loadRates(){

  try{

    const response =
      await fetch(API_URL);

    const data =
      await response.json();

    latestPrices = {};

    data.forEach(item=>{

      if(
        item.symbol.endsWith('USDT')
      ){

        const coin =
          item.symbol.replace(
            'USDT',
            ''
          );

        latestPrices[coin] =
          Number(item.price);

      }

    });

    latestPrices['USDT'] = 1;

    fillCurrencyLists();

    renderRates();

    renderSavedPairs();

    updateConverter();

    info.innerHTML =
      `
        Монет:
        <strong>
          ${Object.keys(latestPrices).length}
        </strong>
      `;

  }catch(error){

    console.error(error);

    ratesGrid.innerHTML =
      `
        <div class="loading">
          Ошибка Binance API
        </div>
      `;

  }

}

function fillCurrencyLists(){

  const currencies =
    Object.keys(latestPrices)
      .sort();

  const options =
    currencies.map(currency => `
      <option value="${currency}">
        ${currency}
      </option>
    `).join('');

  [
    fromCurrency,
    toCurrency,
    pairFrom,
    pairTo
  ].forEach(select => {

    if(select.dataset.loaded)
      return;

    select.innerHTML =
      options;

    select.dataset.loaded =
      'true';

  });

  fromCurrency.value =
    'ETH';

  toCurrency.value =
    'USDT';

}

function renderRates(){

  ratesGrid.innerHTML =
    '';

  Object.entries(latestPrices)
    .sort((a,b)=>
      b[1] - a[1]
    )
    .forEach(([coin,price])=>{

      const card =
        document.createElement('div');

      card.className =
        'rate-card';

      card.innerHTML = `
        <div class="currency">
          ${coin}/USDT
        </div>

        <div class="value">
          ${formatPrice(price)}
        </div>
      `;

      ratesGrid.appendChild(card);

    });

}

function updateConverter(){

  const amount =
    Number(
      amountInput.value || 0
    );

  const from =
    fromCurrency.value;

  const to =
    toCurrency.value;

  if(
    !latestPrices[from] ||
    !latestPrices[to]
  ) return;

  const usdtValue =
    amount * latestPrices[from];

  const result =
    usdtValue / latestPrices[to];

  convertResult.innerHTML =
    `
      <strong>
        ${amount}
        ${from}
      </strong>
      =
      <strong>
        ${result.toFixed(6)}
        ${to}
      </strong>
    `;

}

function renderSavedPairs(){

  savedPairs.innerHTML =
    '';

  selectedPairs.forEach(
    (pair,index)=>{

    const fromPrice =
      latestPrices[pair.from];

    const toPrice =
      latestPrices[pair.to];

    if(
      !fromPrice ||
      !toPrice
    ) return;

    const result =
      fromPrice / toPrice;

    const card =
      document.createElement('div');

    card.className =
      'rate-card';

    card.innerHTML = `
      <div class="currency">
        ${pair.from}
        /
        ${pair.to}
      </div>

      <div class="value">
        ${result.toFixed(6)}
      </div>

      <div
        style="
          margin-top:6px;
          font-size:11px;
          color:var(--muted);
        "
      >
        ${formatPrice(fromPrice)} USDT
      </div>

      <button
        class="btn"
        style="
          margin-top:8px;
          width:100%;
          padding:8px;
          font-size:12px;
        "
        onclick="removePair(${index})"
      >
        Удалить
      </button>
    `;

    savedPairs.appendChild(card);

  });

}

function removePair(index){

  selectedPairs.splice(
    index,
    1
  );

  localStorage.setItem(
    'savedPairs',
    JSON.stringify(
      selectedPairs
    )
  );

  renderSavedPairs();

}

function formatPrice(price){

  if(price >= 1000)
    return price.toFixed(2);

  if(price >= 1)
    return price.toFixed(4);

  return price.toFixed(8);

}

loadBtn.addEventListener(
  'click',
  loadRates
);

convertBtn.addEventListener(
  'click',
  updateConverter
);

fromCurrency.addEventListener(
  'change',
  updateConverter
);

toCurrency.addEventListener(
  'change',
  updateConverter
);

amountInput.addEventListener(
  'input',
  updateConverter
);

savePairBtn.addEventListener(
  'click',
  ()=>{

    const pair = {
      from:pairFrom.value,
      to:pairTo.value
    };

    const exists =
      selectedPairs.some(
        p =>
          p.from === pair.from &&
          p.to === pair.to
      );

    if(exists)
      return;

    selectedPairs.push(pair);

    localStorage.setItem(
      'savedPairs',
      JSON.stringify(
        selectedPairs
      )
    );

    renderSavedPairs();

  }
);

async function updateSavedPairsOnly(){

  try{

    const response =
      await fetch(API_URL);

    const data =
      await response.json();

    data.forEach(item=>{

      if(
        item.symbol.endsWith('USDT')
      ){

        const coin =
          item.symbol.replace(
            'USDT',
            ''
          );

        latestPrices[coin] =
          Number(item.price);

      }

    });

    latestPrices['USDT'] = 1;

    renderSavedPairs();

    updateConverter();

  }catch(error){

    console.error(error);

  }

}

loadRates();

/* закрепленные пары —
   каждые 5 секунд */

setInterval(
  updateSavedPairsOnly,
  5000
);

/* полный список —
   каждые 5 минут */

setInterval(
  loadRates,
  300000
);

</script>

</body>
</html>

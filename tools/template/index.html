<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blacknode305 • Шаблон</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <!-- BACKGROUND -->
  <canvas id="bg"></canvas>
  <div class="container">
    <!-- HEADER -->
    <header class="header">
      <a href="https://blacknode305.github.io/blacknode305/" class="logo">blacknode305</a>
      <div class="header-right">
        <button class="icon-btn" onclick="toggleTheme()" title="Theme">☀️</button>
      </div>
    </header>
    <!-- HERO -->
    <section class="card">
      <h1 class="section-title">Название инструмента</h1>
      <p style="color:var(--muted);line-height:1.7;">Описание инструмента или dashboard.</p>
    </section>
    <!-- GRID -->
    <section class="grid grid-2">
      <!-- CARD -->
      <div class="card">
        <h2 class="section-title">Блок 1</h2>
        <input class="input" placeholder="Введите значение">
        <br><br>
        <button class="btn btn-accent">Действие</button>
      </div>
      <!-- CARD -->
      <div class="card">
        <h2 class="section-title">Блок 2</h2>
        <textarea class="textarea" rows="6" placeholder="Текст..."></textarea>
      </div>
    </section>
    <!-- TABLE -->
    <section class="card">
      <h2 class="section-title">Таблица</h2>
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Статус</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Демо</td>
            <td>OK</td>
          </tr>
        </tbody>
      </table>
    </section>
    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 blacknode305</p>
      <p>GitHub Pages • Профиль • Инструменты</p>
    </footer>
  
  </div>
  <script src="./script.js"></script>
</body>
</html>

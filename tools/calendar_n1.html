<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь смен</title>
  <style>
    /* ===== ОСНОВНЫЕ СТИЛИ ===== */
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
      color: #333;
    }

    h1 {
      text-align: center;
    }

    .controls, .shift-controls {
      margin-bottom: 20px;
      padding: 15px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    label {
      margin-right: 10px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
    }

    button {
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    /* ===== КАЛЕНДАРЬ ===== */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .day-header {
      font-weight: bold;
      text-align: center;
      padding: 10px;
      background: #ddd;
    }

    .day {
      min-height: 70px;
      padding: 5px;
      border: 1px solid #ccc;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: white;
      user-select: none;
    }

    .day.selected {
      outline: 3px solid black;
    }

    /* ===== ДИАГОНАЛЬНОЕ РАЗДЕЛЕНИЕ ПРИ ДВУХ СМЕНАХ ===== */
    .split {
      background: linear-gradient(
        135deg,
        var(--color1) 50%,
        var(--color2) 50%
      );
      color: white;
    }

    /* ===== СПИСОК СОХРАНЕННЫХ ТИПОВ ===== */
    .legend {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
    }

    .color-box {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      border: 1px solid #000;
    }
  </style>
</head>
<body>

  <h1>Календарь смен</h1>

  <!-- ===== ВЫБОР МЕСЯЦА И ГОДА ===== -->
  <div class="controls">
    <label>Месяц:</label>
    <select id="month">
      <option value="0">Январь</option>
      <option value="1">Февраль</option>
      <option value="2">Март</option>
      <option value="3">Апрель</option>
      <option value="4">Май</option>
      <option value="5">Июнь</option>
      <option value="6">Июль</option>
      <option value="7">Август</option>
      <option value="8">Сентябрь</option>
      <option value="9">Октябрь</option>
      <option value="10">Ноябрь</option>
      <option value="11">Декабрь</option>
    </select>

    <label>Год:</label>
    <input type="number" id="year" value="2026">

    <button onclick="generateCalendar()">Продолжить</button>
  </div>

  <!-- ===== КАЛЕНДАРЬ ===== -->
  <div id="calendar" class="calendar"></div>

  <!-- ===== НАЗНАЧЕНИЕ СМЕН ===== -->
  <div class="shift-controls">
    <label>Выбранные дни:</label>
    <input type="text" id="selectedDays" readonly>

    <label>Тип смены:</label>
    <input type="text" id="shiftType" placeholder="Например: Ночные">

    <button onclick="assignShift()">Сохранить смену</button>

    <button onclick="exportData()">Экспорт</button>
    <input type="file" id="importFile" onchange="importData(event)">
  </div>

  <!-- ===== ЛЕГЕНДА ===== -->
  <div class="legend" id="legend"></div>

  <script>
    /* ===== ГЛОБАЛЬНЫЕ ДАННЫЕ ===== */
    let selectedDays = [];
    let shifts = JSON.parse(localStorage.getItem("shifts")) || {};

    // Цвета смен
    const shiftColors = {};

    // Генерация случайного цвета
    function getRandomColor() {
      return "#" + Math.floor(Math.random()*16777215).toString(16);
    }

    /* ===== СОЗДАНИЕ КАЛЕНДАРЯ ===== */
    function generateCalendar() {
      const month = parseInt(document.getElementById("month").value);
      const year = parseInt(document.getElementById("year").value);
      const calendar = document.getElementById("calendar");

      calendar.innerHTML = "";

      const daysOfWeek = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

      // Заголовки дней недели
      daysOfWeek.forEach(day => {
        const header = document.createElement("div");
        header.className = "day-header";
        header.textContent = day;
        calendar.appendChild(header);
      });

      const firstDay = new Date(year, month, 1);
      let startDay = firstDay.getDay();
      if (startDay === 0) startDay = 7;

      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Пустые ячейки до начала месяца
      for (let i = 1; i < startDay; i++) {
        const empty = document.createElement("div");
        calendar.appendChild(empty);
      }

      // Дни месяца
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        dayDiv.onclick = () => toggleDay(day, dayDiv);

        // Проверка сохраненных смен
        const key = `${year}-${month}-${day}`;
        if (shifts[key]) {
          applyShiftColor(dayDiv, shifts[key]);
        }

        calendar.appendChild(dayDiv);
      }

      updateLegend();
    }

    /* ===== ВЫБОР ДНЕЙ ===== */
    function toggleDay(day, element) {
      const index = selectedDays.indexOf(day);

      if (index > -1) {
        selectedDays.splice(index, 1);
        element.classList.remove("selected");
      } else {
        selectedDays.push(day);
        element.classList.add("selected");
      }

      document.getElementById("selectedDays").value = selectedDays.join(", ");
    }

    /* ===== НАЗНАЧЕНИЕ СМЕН ===== */
    function assignShift() {
      const shiftType = document.getElementById("shiftType").value.trim();
      const month = parseInt(document.getElementById("month").value);
      const year = parseInt(document.getElementById("year").value);

      if (!shiftType || selectedDays.length === 0) {
        alert("Выберите дни и укажите тип смены");
        return;
      }

      // Назначаем цвет новому типу смены
      if (!shiftColors[shiftType]) {
        shiftColors[shiftType] = getRandomColor();
      }

      selectedDays.forEach(day => {
        const key = `${year}-${month}-${day}`;

        if (!shifts[key]) {
          shifts[key] = [];
        }

        if (!shifts[key].includes(shiftType)) {
          shifts[key].push(shiftType);
        }
      });

      localStorage.setItem("shifts", JSON.stringify(shifts));

      selectedDays = [];
      document.getElementById("selectedDays").value = "";
      document.getElementById("shiftType").value = "";

      generateCalendar();
    }

    /* ===== ПРИМЕНЕНИЕ ЦВЕТА ===== */
    function applyShiftColor(element, shiftList) {
      if (shiftList.length === 1) {
        const shift = shiftList[0];
        if (!shiftColors[shift]) shiftColors[shift] = getRandomColor();
        element.style.background = shiftColors[shift];
        element.style.color = "white";
      } 
      else if (shiftList.length >= 2) {
        const shift1 = shiftList[0];
        const shift2 = shiftList[1];

        if (!shiftColors[shift1]) shiftColors[shift1] = getRandomColor();
        if (!shiftColors[shift2]) shiftColors[shift2] = getRandomColor();

        element.classList.add("split");
        element.style.setProperty("--color1", shiftColors[shift1]);
        element.style.setProperty("--color2", shiftColors[shift2]);
      }
    }

    /* ===== ЛЕГЕНДА ===== */
    function updateLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "<h3>Типы смен:</h3>";

      Object.keys(shiftColors).forEach(type => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const colorBox = document.createElement("div");
        colorBox.className = "color-box";
        colorBox.style.background = shiftColors[type];

        const text = document.createElement("span");
        text.textContent = type;

        item.appendChild(colorBox);
        item.appendChild(text);

        legend.appendChild(item);
      });
    }

    /* ===== ЭКСПОРТ ===== */
    function exportData() {
      const data = JSON.stringify(shifts, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "calendar_shifts.json";
      a.click();
    }

    /* ===== ИМПОРТ ===== */
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        shifts = JSON.parse(e.target.result);
        localStorage.setItem("shifts", JSON.stringify(shifts));
        generateCalendar();
      };

      reader.readAsText(file);
    }

    /* ===== ПЕРВИЧНАЯ ЗАГРУЗКА ===== */
    generateCalendar();
  </script>

</body>
</html>

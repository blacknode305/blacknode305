<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>blacknode305 • Умный калькулятор</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f13;
  --card:rgba(20,20,28,.72);
  --text:#e8e8f0;
  --muted:#9aa0b4;

  --accent:#8b5cf6;
  --accent2:#06b6d4;

  --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --card:rgba(255,255,255,.82);
  --text:#1e293b;
  --muted:#64748b;
  --border:rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:24px 14px;
  transition:.35s ease;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);
  z-index:-1;
}

.container{
  max-width:900px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.theme-toggle{
  width:46px;
  height:46px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  background:var(--card);
  color:var(--text);
  border:1px solid var(--border);
}

.hero{
  margin-bottom:20px;
}

.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;
}

.hero p{
  color:var(--muted);
  margin-top:6px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:22px;
  padding:18px;
  backdrop-filter:blur(24px);
}

.display{
  width:100%;
  height:70px;
  border-radius:16px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  color:var(--text);
  font-size:28px;
  padding:10px 14px;
  text-align:right;
  outline:none;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:14px;
}

button{
  border:none;
  cursor:pointer;
  border-radius:16px;
  padding:18px;
  font-size:18px;
  font-weight:600;
  color:var(--text);
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  transition:.2s ease;
}

button:hover{
  transform:translateY(-2px);
  border-color:rgba(139,92,246,.5);
}

.op{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;
}

.equal{
  grid-column:span 2;
  background:linear-gradient(135deg,#22c55e,#06b6d4);
  color:white;
}

.clear{
  background:linear-gradient(135deg,#ef4444,#f97316);
  color:white;
}

.footer{
  margin-top:28px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <a href="https://blacknode305.github.io/blacknode305/" class="logo">blacknode305</a>
  <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
</div>

<div class="hero">
  <h1>Умный калькулятор</h1>
  <p>Калькулятор, формулы, значения с API и конвертаторы</p>
</div>

<div class="card">

<input id="display" class="display" type="text" readonly>

<div class="grid">

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button class="op" onclick="append('/')">÷</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button class="op" onclick="append('*')">×</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="op" onclick="append('-')">−</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>
<button class="clear" onclick="clearAll()">C</button>
<button class="op" onclick="append('+')">+</button>

<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<div class="footer">
© 2026 blacknode305 • Tools
</div>

</div>

<script>

const display =
  document.getElementById('display');

function append(v){
  display.value += v;
}

function clearAll(){
  display.value = '';
}

function calculate(){
  try{
    display.value =
      eval(display.value);
  }catch(e){
    display.value = 'Error';
  }
}

function toggleTheme(){
  const root =
    document.documentElement;

  root.dataset.theme =
    root.dataset.theme === 'dark'
      ? 'light'
      : 'dark';
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>blacknode305 • Fiat Rates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg: #0f0f13;
      --card: rgba(20,20,28,.72);
      --text: #e8e8f0;
      --muted: #9aa0b4;

      --accent: #8b5cf6;
      --accent2: #06b6d4;

      --border: rgba(255,255,255,.08);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --card: rgba(255,255,255,.82);
      --text: #1e293b;
      --muted: #64748b;

      --border: rgba(0,0,0,.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;

      background:var(--bg);
      color:var(--text);

      min-height:100vh;

      padding:30px 16px;

      transition:.35s ease;

      overflow-x:hidden;
    }

    body::before{
      content:'';

      position:fixed;
      inset:0;

      background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);

      z-index:-1;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:40px;
    }

    .logo{
      font-family:'Space Grotesk',sans-serif;
      font-size:28px;
      font-weight:700;

      background:linear-gradient(135deg,var(--accent),var(--accent2));

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .theme-toggle{
      width:48px;
      height:48px;

      border:none;
      border-radius:14px;

      cursor:pointer;

      background:var(--card);

      color:var(--text);

      font-size:20px;

      border:1px solid var(--border);

      backdrop-filter:blur(20px);

      transition:.25s ease;
    }

    .theme-toggle:hover{
      transform:scale(1.08) rotate(10deg);
    }

    .hero{
      margin-bottom:30px;
    }

    .hero h1{
      font-family:'Space Grotesk',sans-serif;
      font-size:42px;

      margin-bottom:12px;
    }

    .hero p{
      color:var(--muted);
      line-height:1.6;
    }

    .card{
      background:var(--card);

      border:1px solid var(--border);

      border-radius:22px;

      backdrop-filter:blur(24px);

      padding:22px;
    }

    .controls{
      display:flex;
      gap:14px;
      flex-wrap:wrap;

      margin-bottom:24px;
    }

    select, button{
      border:none;
      outline:none;
    }

    .select{
      flex:1;

      min-width:180px;

      background:rgba(255,255,255,.04);

      border:1px solid var(--border);

      color:var(--text);

      padding:14px 16px;

      border-radius:14px;

      font-size:15px;
    }

    .btn{
      background:linear-gradient(135deg,var(--accent),var(--accent2));

      color:white;

      padding:14px 20px;

      border-radius:14px;

      font-weight:600;

      cursor:pointer;

      transition:.25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .info{
      margin-bottom:18px;
      color:var(--muted);
      font-size:14px;
    }

    .rates-grid{
      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(180px,1fr));

      gap:14px;
    }

    .rate-card{
      background:rgba(255,255,255,.03);

      border:1px solid var(--border);

      border-radius:16px;

      padding:16px;

      transition:.25s ease;
    }

    .rate-card:hover{
      transform:translateY(-4px);
      border-color:var(--accent);
    }

    .currency{
      font-size:14px;
      color:var(--muted);

      margin-bottom:8px;
    }

    .value{
      font-size:22px;
      font-weight:700;
    }

    .footer{
      margin-top:40px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .loading{
      text-align:center;
      padding:30px;
      color:var(--muted);
    }

    @media(max-width:768px){

      .hero h1{
        font-size:34px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <header class="header">

      <div class="logo">
        blacknode305
      </div>

      <button
        class="theme-toggle"
        id="themeToggle"
      >
        ☀️
      </button>

    </header>

    <section class="hero">

      <h1>
        Fiat Currency Rates
      </h1>

      <p>
        Курсы валют относительно выбранной базовой валюты
      </p>

    </section>

    <main class="card">

      <div class="controls">

        <select
          id="baseCurrency"
          class="select"
        >
          <option value="USD">USD</option>
          <option value="KZT">KZT</option>
          <option value="EUR">EUR</option>
          <option value="RUB">RUB</option>
          <option value="GBP">GBP</option>
          <option value="CNY">CNY</option>
          <option value="JPY">JPY</option>
        </select>

        <button
          class="btn"
          id="loadBtn"
        >
          Обновить
        </button>

      </div>

      <div
        class="info"
        id="info"
      >
        Загрузка...
      </div>

      <div
        class="rates-grid"
        id="ratesGrid"
      >
      </div>

    </main>

    <footer class="footer">
      © 2026 blacknode305 • Exchange API
    </footer>

  </div>

<script>

  /* =========================
     THEME
  ========================== */

  const html =
    document.documentElement;

  const themeToggle =
    document.getElementById('themeToggle');

  const savedTheme =
    localStorage.getItem('theme') || 'dark';

  setTheme(savedTheme);

  themeToggle.addEventListener('click', () => {

    const current =
      html.getAttribute('data-theme');

    const next =
      current === 'dark'
        ? 'light'
        : 'dark';

    setTheme(next);

  });

  function setTheme(theme){

    html.setAttribute('data-theme',theme);

    localStorage.setItem('theme',theme);

    themeToggle.textContent =
      theme === 'dark'
        ? '☀️'
        : '🌙';

  }

  /* =========================
     API
  ========================== */

  const API_URL =
    'https://cdn.moneyconvert.net/api/latest.json';

  let latestRates = {};

  /* =========================
     ELEMENTS
  ========================== */

  const baseCurrency =
    document.getElementById('baseCurrency');

  const loadBtn =
    document.getElementById('loadBtn');

  const ratesGrid =
    document.getElementById('ratesGrid');

  const info =
    document.getElementById('info');

  /* =========================
     EXTRA UI
  ========================== */

  const converterHTML = `

    <div class="card" style="margin-top:24px;">

      <h2 style="
        margin-bottom:18px;
        font-family:'Space Grotesk',sans-serif;
      ">
        Currency Converter
      </h2>

      <div class="controls">

        <input
          type="number"
          id="amountInput"
          class="select"
          placeholder="Сумма"
          value="100"
        >

        <select
          id="fromCurrency"
          class="select"
        ></select>

        <select
          id="toCurrency"
          class="select"
        ></select>

        <button
          class="btn"
          id="convertBtn"
        >
          Конвертировать
        </button>

      </div>

      <div
        id="convertResult"
        class="info"
        style="font-size:18px;"
      >
      </div>

    </div>

    <div class="card" style="margin-top:24px;">

      <h2 style="
        margin-bottom:18px;
        font-family:'Space Grotesk',sans-serif;
      ">
        Saved Pairs
      </h2>

      <div class="controls">

        <select
          id="pairFrom"
          class="select"
        ></select>

        <select
          id="pairTo"
          class="select"
        ></select>

        <button
          class="btn"
          id="savePairBtn"
        >
          Сохранить пару
        </button>

      </div>

      <div
        id="savedPairs"
        class="rates-grid"
      ></div>

    </div>
  `;

  document.querySelector('.card')
    .insertAdjacentHTML(
      'afterend',
      converterHTML
    );

  /* =========================
     EXTRA ELEMENTS
  ========================== */

  const fromCurrency =
    document.getElementById('fromCurrency');

  const toCurrency =
    document.getElementById('toCurrency');

  const pairFrom =
    document.getElementById('pairFrom');

  const pairTo =
    document.getElementById('pairTo');

  const savePairBtn =
    document.getElementById('savePairBtn');

  const savedPairs =
    document.getElementById('savedPairs');

  const amountInput =
    document.getElementById('amountInput');

  const convertBtn =
    document.getElementById('convertBtn');

  const convertResult =
    document.getElementById('convertResult');

  /* =========================
     STORAGE
  ========================== */

  let selectedPairs =
    JSON.parse(
      localStorage.getItem('savedPairs')
    ) || [
      {
        from:'USD',
        to:'KZT'
      },
      {
        from:'EUR',
        to:'USD'
      }
    ];

  /* =========================
     LOAD RATES
  ========================== */

  async function loadRates(){

    ratesGrid.innerHTML =
      `<div class="loading">Загрузка...</div>`;

    try{

      const response =
        await fetch(API_URL);

      const data =
        await response.json();

      latestRates =
        data.rates;

      fillCurrencyLists();

      renderRates();

      renderSavedPairs();

      updateConverter();

      info.innerHTML =
        `
          Всего валют:
          <strong>
            ${Object.keys(latestRates).length}
          </strong>
        `;

    }catch(error){

      console.error(error);

      ratesGrid.innerHTML =
        `<div class="loading">
          Ошибка загрузки
        </div>`;

    }

  }

  /* =========================
     FILL LISTS
  ========================== */

  function fillCurrencyLists(){

    const currencies =
      Object.keys(latestRates)
        .sort();

    const htmlOptions =
      currencies.map(currency => `
        <option value="${currency}">
          ${currency}
        </option>
      `).join('');

    [
      baseCurrency,
      fromCurrency,
      toCurrency,
      pairFrom,
      pairTo
    ].forEach(select => {

      if(
        select.dataset.loaded
      ) return;

      select.innerHTML =
        htmlOptions;

      select.dataset.loaded =
        'true';

    });

    baseCurrency.value = 'USD';

    fromCurrency.value = 'USD';
    toCurrency.value = 'KZT';

    pairFrom.value = 'USD';
    pairTo.value = 'EUR';

  }

  /* =========================
     MAIN GRID
  ========================== */

  function renderRates(){

    ratesGrid.innerHTML = '';

    const base =
      baseCurrency.value;

    const baseRate =
      latestRates[base];

    const converted = {};

    Object.entries(latestRates)
      .forEach(([currency,value]) => {

        converted[currency] =
          value / baseRate;

      });

    Object.entries(converted)
      .sort((a,b)=>
        a[0].localeCompare(b[0])
      )
      .forEach(([currency,value]) => {

        const card =
          document.createElement('div');

        card.className =
          'rate-card';

        card.innerHTML = `
          <div class="currency">
            ${currency}
          </div>

          <div class="value">
            ${value.toFixed(4)}
          </div>
        `;

        ratesGrid.appendChild(card);

      });

  }

  /* =========================
     CONVERTER
  ========================== */

  function updateConverter(){

    const amount =
      Number(amountInput.value || 0);

    const from =
      fromCurrency.value;

    const to =
      toCurrency.value;

    if(
      !latestRates[from] ||
      !latestRates[to]
    ) return;

    const usdValue =
      amount / latestRates[from];

    const result =
      usdValue * latestRates[to];

    convertResult.innerHTML =
      `
        <strong>
          ${amount}
          ${from}
        </strong>
        =
        <strong>
          ${result.toFixed(2)}
          ${to}
        </strong>
      `;

  }

  /* =========================
     SAVED PAIRS
  ========================== */

  function renderSavedPairs(){

    savedPairs.innerHTML = '';

    selectedPairs.forEach((pair,index)=>{

      const fromRate =
        latestRates[pair.from];

      const toRate =
        latestRates[pair.to];

      if(!fromRate || !toRate)
        return;

      const result =
        toRate / fromRate;

      const card =
        document.createElement('div');

      card.className =
        'rate-card';

      card.innerHTML = `
        <div class="currency">
          ${pair.from} → ${pair.to}
        </div>

        <div class="value">
          ${result.toFixed(4)}
        </div>

        <button
          class="btn"
          style="
            margin-top:12px;
            width:100%;
          "
          onclick="removePair(${index})"
        >
          Удалить
        </button>
      `;

      savedPairs.appendChild(card);

    });

  }

  function removePair(index){

    selectedPairs.splice(index,1);

    localStorage.setItem(
      'savedPairs',
      JSON.stringify(selectedPairs)
    );

    renderSavedPairs();

  }

  /* =========================
     EVENTS
  ========================== */

  loadBtn.addEventListener(
    'click',
    renderRates
  );

  baseCurrency.addEventListener(
    'change',
    renderRates
  );

  convertBtn.addEventListener(
    'click',
    updateConverter
  );

  fromCurrency.addEventListener(
    'change',
    updateConverter
  );

  toCurrency.addEventListener(
    'change',
    updateConverter
  );

  amountInput.addEventListener(
    'input',
    updateConverter
  );

  savePairBtn.addEventListener(
    'click',
    ()=>{

      const pair = {
        from: pairFrom.value,
        to: pairTo.value
      };

      const exists =
        selectedPairs.some(p =>
          p.from === pair.from &&
          p.to === pair.to
        );

      if(exists)
        return;

      selectedPairs.push(pair);

      localStorage.setItem(
        'savedPairs',
        JSON.stringify(selectedPairs)
      );

      renderSavedPairs();

    }
  );

  /* =========================
     AUTO UPDATE
  ========================== */

  loadRates();

  setInterval(
    loadRates,
    60000
  );

</script>

</body>
</html>

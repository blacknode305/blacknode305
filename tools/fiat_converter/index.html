<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>blacknode305 • Fiat Rates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg: #0f0f13;
      --card: rgba(20,20,28,.72);
      --text: #e8e8f0;
      --muted: #9aa0b4;

      --accent: #8b5cf6;
      --accent2: #06b6d4;

      --border: rgba(255,255,255,.08);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --card: rgba(255,255,255,.82);
      --text: #1e293b;
      --muted: #64748b;

      --border: rgba(0,0,0,.08);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;

      background:var(--bg);
      color:var(--text);

      min-height:100vh;

      padding:30px 16px;

      transition:.35s ease;

      overflow-x:hidden;
    }

    body::before{
      content:'';

      position:fixed;
      inset:0;

      background:
        radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);

      z-index:-1;
    }

    .container{
      max-width:1100px;
      margin:0 auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;

      margin-bottom:40px;
    }

    .logo{
      font-family:'Space Grotesk',sans-serif;
      font-size:28px;
      font-weight:700;

      background:linear-gradient(135deg,var(--accent),var(--accent2));

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .theme-toggle{
      width:48px;
      height:48px;

      border:none;
      border-radius:14px;

      cursor:pointer;

      background:var(--card);

      color:var(--text);

      font-size:20px;

      border:1px solid var(--border);

      backdrop-filter:blur(20px);

      transition:.25s ease;
    }

    .theme-toggle:hover{
      transform:scale(1.08) rotate(10deg);
    }

    .hero{
      margin-bottom:30px;
    }

    .hero h1{
      font-family:'Space Grotesk',sans-serif;
      font-size:42px;

      margin-bottom:12px;
    }

    .hero p{
      color:var(--muted);
      line-height:1.6;
    }

    .card{
      background:var(--card);

      border:1px solid var(--border);

      border-radius:22px;

      backdrop-filter:blur(24px);

      padding:22px;
    }

    .controls{
      display:flex;
      gap:14px;
      flex-wrap:wrap;

      margin-bottom:24px;
    }

    select, button{
      border:none;
      outline:none;
    }

    .select{
      flex:1;

      min-width:180px;

      background:rgba(255,255,255,.04);

      border:1px solid var(--border);

      color:var(--text);

      padding:14px 16px;

      border-radius:14px;

      font-size:15px;
    }

    .btn{
      background:linear-gradient(135deg,var(--accent),var(--accent2));

      color:white;

      padding:14px 20px;

      border-radius:14px;

      font-weight:600;

      cursor:pointer;

      transition:.25s ease;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .info{
      margin-bottom:18px;
      color:var(--muted);
      font-size:14px;
    }

    .rates-grid{
      display:grid;

      grid-template-columns:
        repeat(auto-fit,minmax(180px,1fr));

      gap:14px;
    }

    .rate-card{
      background:rgba(255,255,255,.03);

      border:1px solid var(--border);

      border-radius:16px;

      padding:16px;

      transition:.25s ease;
    }

    .rate-card:hover{
      transform:translateY(-4px);
      border-color:var(--accent);
    }

    .currency{
      font-size:14px;
      color:var(--muted);

      margin-bottom:8px;
    }

    .value{
      font-size:22px;
      font-weight:700;
    }

    .footer{
      margin-top:40px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
    }

    .loading{
      text-align:center;
      padding:30px;
      color:var(--muted);
    }

    @media(max-width:768px){

      .hero h1{
        font-size:34px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <header class="header">

      <div class="logo">
        blacknode305
      </div>

      <button
        class="theme-toggle"
        id="themeToggle"
      >
        ☀️
      </button>

    </header>

    <section class="hero">

      <h1>
        Fiat Currency Rates
      </h1>

      <p>
        Курсы валют относительно выбранной базовой валюты
      </p>

    </section>

    <main class="card">

      <div class="controls">

        <select
          id="baseCurrency"
          class="select"
        >
          <option value="USD">USD</option>
          <option value="KZT">KZT</option>
          <option value="EUR">EUR</option>
          <option value="RUB">RUB</option>
          <option value="GBP">GBP</option>
          <option value="CNY">CNY</option>
          <option value="JPY">JPY</option>
        </select>

        <button
          class="btn"
          id="loadBtn"
        >
          Обновить
        </button>

      </div>

      <div
        class="info"
        id="info"
      >
        Загрузка...
      </div>

      <div
        class="rates-grid"
        id="ratesGrid"
      >
      </div>

    </main>

    <footer class="footer">
      © 2026 blacknode305 • Exchange API
    </footer>

  </div>

  <script>

    /* =========================
       THEME
    ========================== */

    const html =
      document.documentElement;

    const themeToggle =
      document.getElementById('themeToggle');

    const savedTheme =
      localStorage.getItem('theme') || 'dark';

    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {

      const current =
        html.getAttribute('data-theme');

      const next =
        current === 'dark'
          ? 'light'
          : 'dark';

      setTheme(next);

    });

    function setTheme(theme){

      html.setAttribute('data-theme',theme);

      localStorage.setItem('theme',theme);

      themeToggle.textContent =
        theme === 'dark'
          ? '☀️'
          : '🌙';

    }

    /* =========================
       FIAT RATES
    ========================== */

    const baseCurrency =
      document.getElementById('baseCurrency');

    const loadBtn =
      document.getElementById('loadBtn');

    const ratesGrid =
      document.getElementById('ratesGrid');

    const info =
      document.getElementById('info');

    async function loadRates(){

      const base =
        baseCurrency.value;

      ratesGrid.innerHTML =
        `<div class="loading">Загрузка...</div>`;

      try{

        const response =
          await fetch(
            `https://api.frankfurter.app/latest?from=${base}`
          );

        const data =
          await response.json();

        renderRates(data);

      }catch(error){

        console.error(error);

        ratesGrid.innerHTML =
          `<div class="loading">
            Ошибка загрузки
          </div>`;

      }

    }

    function renderRates(data){

      ratesGrid.innerHTML = '';

      info.innerHTML =
        `Базовая валюта:
         <strong>${data.base}</strong>
         • Дата:
         <strong>${data.date}</strong>`;

      const allRates = {
        [data.base]: 1,
        ...data.rates
      };

      Object.entries(allRates)
        .sort((a,b) =>
          a[0].localeCompare(b[0])
        )
        .forEach(([currency,value]) => {

          const card =
            document.createElement('div');

          card.className =
            'rate-card';

          card.innerHTML = `
            <div class="currency">
              ${currency}
            </div>

            <div class="value">
              ${Number(value).toFixed(4)}
            </div>
          `;

          ratesGrid.appendChild(card);

        });

    }

    loadBtn.addEventListener(
      'click',
      loadRates
    );

    loadRates();

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь смен</title>

  <style>
    /* ==========================================
       ОСНОВНЫЕ СТИЛИ
    ========================================== */
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f4;
      color: #333;
    }

    h1 {
      text-align: center;
    }

    .controls,
    .shift-controls,
    .legend {
      background: white;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input,
    select,
    button {
      padding: 8px;
      margin: 5px;
    }

    button {
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }

    /* ==========================================
       КАЛЕНДАРЬ
    ========================================== */
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    .day-header {
      font-weight: bold;
      text-align: center;
      padding: 10px;
      background: #ddd;
    }

    .day {
      min-height: 70px;
      border: 1px solid #ccc;
      padding: 5px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      position: relative;
      background: white;
    }

    .day.selected {
      outline: 3px solid black;
    }

    /* ==========================================
       ДИАГОНАЛЬНОЕ РАЗДЕЛЕНИЕ ПРИ ПЕРЕСЕЧЕНИИ
    ========================================== */
    .split {
      background: linear-gradient(
        135deg,
        var(--color1) 50%,
        var(--color2) 50%
      );
      color: white;
    }

    /* ==========================================
       ЛЕГЕНДА
    ========================================== */
    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
    }

    .color-box {
      width: 20px;
      height: 20px;
      border: 1px solid #000;
      margin-right: 10px;
    }
  </style>
</head>
<body>

  <h1>Календарь смен</h1>

  <!-- ==========================================
       ВЫБОР МЕСЯЦА И ГОДА
  ========================================== -->
  <div class="controls">
    <label>Месяц:</label>
    <select id="month">
      <option value="0">Январь</option>
      <option value="1">Февраль</option>
      <option value="2">Март</option>
      <option value="3">Апрель</option>
      <option value="4">Май</option>
      <option value="5">Июнь</option>
      <option value="6">Июль</option>
      <option value="7">Август</option>
      <option value="8">Сентябрь</option>
      <option value="9">Октябрь</option>
      <option value="10">Ноябрь</option>
      <option value="11">Декабрь</option>
    </select>

    <label>Год:</label>
    <input type="number" id="year" value="2026">

    <button onclick="generateCalendar()">Продолжить</button>
  </div>

  <!-- ==========================================
       КАЛЕНДАРЬ
  ========================================== -->
  <div id="calendar" class="calendar"></div>

  <!-- ==========================================
       УПРАВЛЕНИЕ СМЕНАМИ
  ========================================== -->
  <div class="shift-controls">
    <label>Выбранные дни:</label>
    <input type="text" id="selectedDays" readonly>

    <label>Тип смены:</label>
    <input type="text" id="shiftType" placeholder="Например: Ночные">

    <label>HEX цвет:</label>
    <input type="text" id="shiftColor" placeholder="#ff0000">

    <button onclick="assignShift()">Сохранить смену</button>

    <button onclick="exportData()">Экспорт</button>

    <input type="file" id="importFile" onchange="importData(event)">
  </div>

  <!-- ==========================================
       ЛЕГЕНДА
  ========================================== -->
  <div class="legend" id="legend"></div>

  <script>
    /* ==========================================
       ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    ========================================== */

    let selectedDays = [];

    /*
      Структура localStorage:
      {
        shifts: {
          "2026-4-1": ["Ночные"],
          "2026-4-5": ["Ночные", "Дневные"]
        },
        colors: {
          "Ночные": "#ff0000",
          "Дневные": "#00ff00"
        }
      }
    */
    let savedData = JSON.parse(localStorage.getItem("calendarData")) || {
      shifts: {},
      colors: {}
    };

    let shifts = savedData.shifts;
    let shiftColors = savedData.colors;

    /* ==========================================
       СОХРАНЕНИЕ В localStorage
    ========================================== */
    function saveData() {
      localStorage.setItem("calendarData", JSON.stringify({
        shifts,
        colors: shiftColors
      }));
    }

    /* ==========================================
       ПРОВЕРКА HEX ЦВЕТА
    ========================================== */
    function isValidHex(color) {
      return /^#([0-9A-F]{3}){1,2}$/i.test(color);
    }

    /* ==========================================
       СОЗДАНИЕ КАЛЕНДАРЯ
    ========================================== */
    function generateCalendar() {
      const month = parseInt(document.getElementById("month").value);
      const year = parseInt(document.getElementById("year").value);
      const calendar = document.getElementById("calendar");

      calendar.innerHTML = "";

      const daysOfWeek = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

      // Заголовки дней недели
      daysOfWeek.forEach(day => {
        const header = document.createElement("div");
        header.className = "day-header";
        header.textContent = day;
        calendar.appendChild(header);
      });

      const firstDay = new Date(year, month, 1);
      let startDay = firstDay.getDay();

      // JS считает воскресенье = 0
      if (startDay === 0) startDay = 7;

      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // Пустые клетки до первого дня
      for (let i = 1; i < startDay; i++) {
        calendar.appendChild(document.createElement("div"));
      }

      // Создание дней месяца
      for (let day = 1; day <= daysInMonth; day++) {
        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        dayDiv.textContent = day;

        // Выбор дня
        dayDiv.onclick = () => toggleDay(day, dayDiv);

        // Проверка сохраненных смен
        const key = `${year}-${month}-${day}`;
        if (shifts[key]) {
          applyShiftColor(dayDiv, shifts[key]);
        }

        calendar.appendChild(dayDiv);
      }

      updateLegend();
    }

    /* ==========================================
       ВЫБОР ДНЕЙ
    ========================================== */
    function toggleDay(day, element) {
      const index = selectedDays.indexOf(day);

      if (index > -1) {
        selectedDays.splice(index, 1);
        element.classList.remove("selected");
      } else {
        selectedDays.push(day);
        element.classList.add("selected");
      }

      document.getElementById("selectedDays").value = selectedDays.join(", ");
    }

    /* ==========================================
       НАЗНАЧЕНИЕ СМЕН
    ========================================== */
    function assignShift() {
      const shiftType = document.getElementById("shiftType").value.trim();
      const shiftColor = document.getElementById("shiftColor").value.trim();

      const month = parseInt(document.getElementById("month").value);
      const year = parseInt(document.getElementById("year").value);

      if (!shiftType || selectedDays.length === 0) {
        alert("Выберите дни и введите тип смены");
        return;
      }

      if (!isValidHex(shiftColor)) {
        alert("Введите корректный HEX цвет, например #ff0000");
        return;
      }

      // Сохраняем цвет типа смены
      shiftColors[shiftType] = shiftColor;

      // Сохраняем дни
      selectedDays.forEach(day => {
        const key = `${year}-${month}-${day}`;

        if (!shifts[key]) {
          shifts[key] = [];
        }

        if (!shifts[key].includes(shiftType)) {
          shifts[key].push(shiftType);
        }
      });

      saveData();

      // Очистка
      selectedDays = [];
      document.getElementById("selectedDays").value = "";
      document.getElementById("shiftType").value = "";
      document.getElementById("shiftColor").value = "";

      generateCalendar();
    }

    /* ==========================================
       ОКРАСКА ДНЕЙ
    ========================================== */
    function applyShiftColor(element, shiftList) {

      // Одна смена
      if (shiftList.length === 1) {
        const shift = shiftList[0];

        element.style.background = shiftColors[shift] || "#999";
        element.style.color = "white";
      }

      // Две смены — диагональ
      else if (shiftList.length >= 2) {
        const shift1 = shiftList[0];
        const shift2 = shiftList[1];

        element.classList.add("split");
        element.style.setProperty("--color1", shiftColors[shift1] || "#999");
        element.style.setProperty("--color2", shiftColors[shift2] || "#555");
      }
    }

    /* ==========================================
       ЛЕГЕНДА СМЕН
    ========================================== */
    function updateLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "<h3>Типы смен:</h3>";

      Object.keys(shiftColors).forEach(type => {
        const item = document.createElement("div");
        item.className = "legend-item";

        const colorBox = document.createElement("div");
        colorBox.className = "color-box";
        colorBox.style.background = shiftColors[type];

        const text = document.createElement("span");
        text.textContent = `${type} (${shiftColors[type]})`;

        item.appendChild(colorBox);
        item.appendChild(text);

        legend.appendChild(item);
      });
    }

    /* ==========================================
       ЭКСПОРТ JSON
    ========================================== */
    function exportData() {
      const data = JSON.stringify({
        shifts,
        colors: shiftColors
      }, null, 2);

      const blob = new Blob([data], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "calendar_shifts.json";
      a.click();
    }

    /* ==========================================
       ИМПОРТ JSON
    ========================================== */
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        const imported = JSON.parse(e.target.result);

        shifts = imported.shifts || {};
        shiftColors = imported.colors || {};

        saveData();
        generateCalendar();
      };

      reader.readAsText(file);
    }

    /* ==========================================
       ПЕРВИЧНАЯ ЗАГРУЗКА
    ========================================== */
    generateCalendar();

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>blacknode305 • Finance Tracker</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0f13;
  --card:rgba(20,20,28,.72);
  --text:#e8e8f0;
  --muted:#9aa0b4;

  --accent:#8b5cf6;
  --accent2:#06b6d4;

  --income:#22c55e;
  --expense:#ef4444;

  --border:rgba(255,255,255,.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --card:rgba(255,255,255,.82);
  --text:#1e293b;
  --muted:#64748b;

  --border:rgba(0,0,0,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;

  background:var(--bg);
  color:var(--text);

  min-height:100vh;

  padding:24px 14px;

  transition:.35s ease;

  overflow-x:hidden;
}

body::before{
  content:'';

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at 20% 20%, rgba(139,92,246,.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(6,182,212,.15), transparent 40%);

  z-index:-1;
}

.container{
  max-width:1100px;
  margin:0 auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:30px;
}

.logo{
  font-family:'Space Grotesk',sans-serif;
  font-size:26px;
  font-weight:700;

  background:linear-gradient(135deg,var(--accent),var(--accent2));

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.theme-toggle{
  width:46px;
  height:46px;

  border:none;
  border-radius:14px;

  cursor:pointer;

  background:var(--card);

  color:var(--text);

  font-size:18px;

  border:1px solid var(--border);

  backdrop-filter:blur(20px);

  transition:.25s ease;
}

.theme-toggle:hover{
  transform:scale(1.06);
}

.hero{
  margin-bottom:24px;
}

.hero h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:34px;

  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
  line-height:1.6;
}

.grid{
  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:20px;

  margin-bottom:22px;
}

.card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:22px;

  backdrop-filter:blur(24px);

  padding:18px;
}

.section-title{
  margin-bottom:16px;

  font-family:'Space Grotesk',sans-serif;
}

.controls{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

select,
button,
input{
  border:none;
  outline:none;
}

.select{
  flex:1;

  min-width:130px;

  background:rgba(255,255,255,.04);

  border:1px solid var(--border);

  color:var(--text);

  padding:12px 14px;

  border-radius:14px;

  font-size:14px;
}

.btn{
  padding:12px 18px;

  border-radius:14px;

  font-weight:600;

  cursor:pointer;

  transition:.25s ease;

  color:white;
}

.btn:hover{
  transform:translateY(-2px);
}

.income-btn{
  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );
}

.expense-btn{
  background:
    linear-gradient(
      135deg,
      #ef4444,
      #dc2626
    );
}

.balance-card{
  text-align:center;
}

.balance-value{
  font-size:42px;
  font-weight:700;

  margin-top:10px;

  font-family:'Space Grotesk',sans-serif;
}

.balance-positive{
  color:var(--income);
}

.balance-negative{
  color:var(--expense);
}

.table-wrapper{
  overflow-x:auto;
}

table{
  width:100%;

  border-collapse:collapse;

  margin-top:10px;
}

th{
  background:rgba(255,255,255,.04);

  color:var(--muted);

  font-weight:600;
}

th,
td{
  border:1px solid var(--border);

  padding:12px;

  text-align:center;
}

tr:hover{
  background:rgba(255,255,255,.03);
}

.badge{
  padding:6px 10px;

  border-radius:999px;

  font-size:12px;

  font-weight:700;

  display:inline-block;
}

.badge-income{
  background:rgba(34,197,94,.15);
  color:#22c55e;
}

.badge-expense{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:20px;
}

.footer{
  margin-top:34px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media(max-width:800px){

  .grid{
    grid-template-columns:1fr;
  }

}

@media(max-width:520px){

  .hero h1{
    font-size:28px;
  }

  th,
  td{
    padding:8px;
    font-size:12px;
  }

  .balance-value{
    font-size:32px;
  }

}

</style>
</head>
<body>

<div class="container">

<header class="header">

<div class="logo">
blacknode305
</div>

<button
  class="theme-toggle"
  id="themeToggle"
>
☀️
</button>

</header>

<section class="hero">

<h1>
Finance Tracker
</h1>

<p>
Доходы, расходы и история операций
</p>

</section>

<div class="grid">

<div class="card">

<h2 class="section-title">
Income
</h2>

<div class="controls">

<input
  id="incomeInput"
  type="number"
  class="select"
  placeholder="Сумма дохода"
/>

<button
  class="btn income-btn"
  onclick="addIncome()"
>
Добавить
</button>

</div>

</div>

<div class="card">

<h2 class="section-title">
Expense
</h2>

<div class="controls">

<input
  id="expenseInput"
  type="number"
  class="select"
  placeholder="Сумма расхода"
/>

<button
  class="btn expense-btn"
  onclick="addExpense()"
>
Добавить
</button>

</div>

</div>

</div>

<div class="card balance-card">

<h2 class="section-title">
Balance
</h2>

<div
  id="balanceText"
  class="balance-value"
>
0
</div>

</div>

<div class="card">

<h2 class="section-title">
History
</h2>

<div class="table-wrapper">

<table>

<thead>

<tr>
<th>Тип</th>
<th>Сумма</th>
<th>Дата</th>
</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

<div
  id="emptyState"
  class="empty"
>
Нет операций
</div>

</div>

<footer class="footer">
© 2026 blacknode305 • Finance Tracker
</footer>

</div>

<script>

const html =
  document.documentElement;

const themeToggle =
  document.getElementById('themeToggle');

const savedTheme =
  localStorage.getItem('theme') || 'dark';

setTheme(savedTheme);

themeToggle.addEventListener('click',()=>{

  const current =
    html.getAttribute('data-theme');

  const next =
    current === 'dark'
      ? 'light'
      : 'dark';

  setTheme(next);

});

function setTheme(theme){

  html.setAttribute(
    'data-theme',
    theme
  );

  localStorage.setItem(
    'theme',
    theme
  );

  themeToggle.textContent =
    theme === 'dark'
      ? '☀️'
      : '🌙';

}

let data =
  JSON.parse(
    localStorage.getItem(
      'finance_data'
    )
  ) || [];

function saveData(){

  localStorage.setItem(
    'finance_data',
    JSON.stringify(data)
  );

}

function getDate(){

  return new Date()
    .toLocaleString();

}

function addIncome(){

  const val =
    +document.getElementById(
      'incomeInput'
    ).value;

  if(!val) return;

  data.unshift({
    type:'income',
    amount:val,
    date:getDate()
  });

  document.getElementById(
    'incomeInput'
  ).value = '';

  update();

}

function addExpense(){

  const val =
    +document.getElementById(
      'expenseInput'
    ).value;

  if(!val) return;

  data.unshift({
    type:'expense',
    amount:val,
    date:getDate()
  });

  document.getElementById(
    'expenseInput'
  ).value = '';

  update();

}

function update(){

  saveData();

  const table =
    document.getElementById(
      'historyTable'
    );

  const emptyState =
    document.getElementById(
      'emptyState'
    );

  table.innerHTML = '';

  let balance = 0;

  data.forEach(item=>{

    if(item.type === 'income'){

      balance += item.amount;

    }else{

      balance -= item.amount;

    }

    const row =
      document.createElement('tr');

    row.innerHTML = `
      <td>
        <span class="
          badge
          ${item.type === 'income'
            ? 'badge-income'
            : 'badge-expense'}
        ">
          ${item.type}
        </span>
      </td>

      <td>
        ${item.amount}
      </td>

      <td>
        ${item.date}
      </td>
    `;

    table.appendChild(row);

  });

  const balanceText =
    document.getElementById(
      'balanceText'
    );

  balanceText.innerText =
    balance;

  balanceText.className =
    `
      balance-value
      ${balance >= 0
        ? 'balance-positive'
        : 'balance-negative'}
    `;

  emptyState.style.display =
    data.length
      ? 'none'
      : 'block';

}

update();

</script>

</body>
</html>
